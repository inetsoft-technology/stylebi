@if (queryResult?.length <=0) {
  <div>
    <h2>_#(em.security.ldap.queryResultNotFound)</h2>
  </div>
} @else {
  @if (!!label) {
    <div>
      <h4>{{label}}</h4>
    </div>
  }
}


<mat-nav-list [disableRipple]="!selectable">
  @for (item of queryResult; track item) {
    <mat-list-item (click)="ok($event, item)">
      {{item}}
    </mat-list-item>
  }
</mat-nav-list>

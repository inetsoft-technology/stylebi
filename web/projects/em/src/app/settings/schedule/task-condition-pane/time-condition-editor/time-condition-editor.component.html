@switch (condition.type) {
  @case (TimeConditionType.EVERY_DAY) {
    <em-daily-condition-editor
      [timeRangeEnabled]="timeRangeEnabled"
      [condition]="condition"
      [timeZone]="timeZone"
      [timeZoneOptions]="timeZoneOptions"
      [timeRanges]="timeRanges"
      [startTimeEnabled]="startTimeEnabled"
      [showMeridian]="showMeridian"
      (modelChanged)="onModelChanged($event)"
      >
    </em-daily-condition-editor>
  }
  @case (TimeConditionType.EVERY_WEEK) {
    <em-weekly-condition-editor
      [timeRangeEnabled]="timeRangeEnabled"
      [condition]="condition"
      [timeZone]="timeZone"
      [timeZoneOptions]="timeZoneOptions"
      [timeRanges]="timeRanges"
      [showMeridian]="showMeridian"
      [startTimeEnabled]="startTimeEnabled"
      (modelChanged)="onModelChanged($event)"
      >
    </em-weekly-condition-editor>
  }
  @case (TimeConditionType.EVERY_MONTH) {
    <em-monthly-condition-editor
      [timeRangeEnabled]="timeRangeEnabled"
      [condition]="condition"
      [timeZone]="timeZone"
      [timeZoneOptions]="timeZoneOptions"
      [timeRanges]="timeRanges"
      [startTimeEnabled]="startTimeEnabled"
      [showMeridian]="showMeridian"
      (modelChanged)="onModelChanged($event)"
      >
    </em-monthly-condition-editor>
  }
  @case (TimeConditionType.EVERY_HOUR) {
    <em-hourly-condition-editor
      [condition]="condition"
      [timeZoneOptions]="timeZoneOptions"
      [showMeridian]="showMeridian"
      (modelChanged)="onModelChanged($event)"
      >
    </em-hourly-condition-editor>
  }
  @case (TimeConditionType.AT) {
    <em-run-once-condition-editor
      [condition]="condition"
      [timeZoneOptions]="timeZoneOptions"
      [showMeridian]="showMeridian"
      (modelChanged)="onModelChanged($event)"
      >
    </em-run-once-condition-editor>
  }
}

<div [style.width]="sliderWidth + 'px'"
     class="slider unselectable-canvas"
     [class.disabled]="!enabled">
  <div class="wrapper">
    <div class="slider-track" (click)="moveHandleHere($event)"></div>
    <div class="slider-tracked" [style.width]="getValueX() + 'px'"></div>
    <div class="slider-handle" [style.left]="getValueLeft()"
         [class.is-dragging]="isDragging"
         (mousedown)="mouseDown($event)">
    </div>
    <div class="slider-tick" *ngFor="let tick of ticks" [style.left]="tick.left">|</div>
    <div class="slider-value" [style.left]="getLabelLeft()">{{getLabel()}}</div>
  </div>
</div>

<div [style.width]="model.width + 'px'"
     class="range-slider-container unselectable-canvas"
     #rangeSlider>
  <div class="wrapper">
    <!-- Inactive track (full width, with overhang caps via ::before / ::after) -->
    <div class="slider-track"></div>

    <!-- Active track — spans between the two handles; draggable to move the whole range -->
    <div class="slider-tracked"
         [style.left.px]="getRangeX()"
         [style.width.px]="getRangeWidth()"
         [class.is-dragging]="isDraggingMiddle"
         (mousedown)="mouseDown($event, handleType.Middle)">
    </div>

    <!-- Left handle -->
    <div class="slider-handle"
         [style.left.px]="getRangeX()"
         [class.is-dragging]="isDraggingLeft"
         (mousedown)="mouseDown($event, handleType.Left)"
         #leftHandle>
    </div>

    <!-- Right handle -->
    <div class="slider-handle"
         [style.left.px]="getRangeX() + getRangeWidth()"
         [class.is-dragging]="isDraggingRight"
         (mousedown)="mouseDown($event, handleType.Right)">
    </div>

    <!-- Tick dots -->
    <div class="slider-tick" *ngFor="let tick of ticks" [style.left]="tick.left"></div>

    <!-- Value label — centred between the two handles -->
    <div class="slider-value" [style.left.px]="getRangeX() + getRangeWidth() / 2">
      {{getCurrentLabel()}}
    </div>
  </div>
</div>

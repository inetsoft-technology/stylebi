<div class="popup-editor__container">
  <div class="popup-editor__button-group">
    <button class="popup-editor__button btn" title="_#(Apply)"
            (click)="submit()">
      <i class="submit-icon icon-size-small" aria-hidden="true"></i>
    </button>
  </div>
  <div class="row shell-form-row--field">
    <div class="col form-floating">
      <custom-select [options]="formulaOptions"
                     [(ngModel)]="baseFormula"
                     placeholder="_#(Aggregate)">
      </custom-select>
      <label><span>_#(Aggregate)</span></label>
    </div>
  </div>
  <div class="row shell-form-row--field" *ngIf="!hasN">
    <div class="col form-floating">
      <custom-select [options]="availableFieldOptions"
                     [(ngModel)]="secondCol"
                     [disabled]="!isTwoColumns()"
                     placeholder="_#(With)">
      </custom-select>
      <label><span>_#(With)</span></label>
    </div>
  </div>
  <div class="row shell-form-row--field" *ngIf="hasN">
    <div class="col-auto form-floating">
      <input type="text" id="num" class="form-control" [(ngModel)]="nStr">
      <label><span>{{getNPLabel()}}</span></label>
    </div>
  </div>
  <div class="row shell-form-row--field">
    <div class="col form-floating">
      <custom-select [options]="percentOptions"
                     [(ngModel)]="percentage"
                     [disabled]="!isPercent()"
                     placeholder="_#(Percentage)">
      </custom-select>
      <label><span>_#(Percentage)</span></label>
    </div>
  </div>
  <div *ngIf="(isNthFormula() || isPthFormula()) && !isNValid()"
       class="shell-alert shell-alert--danger">
    _#(table.formula.parameterError)
  </div>
</div>

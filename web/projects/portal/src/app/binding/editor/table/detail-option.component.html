<div class="detailPane">
  @if (order == 0 && !embedded) {
    <button class="sort-icon"
      (click)="changeOrder(1, $event)" title="_#(Sort None)">
    </button>
  }
  @if (order == 1 && !embedded) {
    <button class="sort-ascending-icon"
      (click)="changeOrder(2, $event)"
      title="_#(Sort Ascending)">
    </button>
  }
  @if (order == 2 && !embedded) {
    <button class="sort-descending-icon"
      (click)="changeOrder(0, $event)"
      title="_#(Sort Descending)">
    </button>
  }
  @if (visible) {
    <button class="eye-icon"
      (click)="changeVisible(false)"
      title="_#(Show/Hide)">
    </button>
  }
  @if (!visible) {
    <button class="eye-off-icon"
      (click)="changeVisible(true)"
      title="_#(Show/Hide)">
    </button>
  }
</div>

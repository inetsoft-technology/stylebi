<div class="form-floating">
  <div class="input-group">
    <select data-test="Trend and Comparison Dropdown" class="form-control calc-combo" [(ngModel)]="calculateValue" [disabled]="!enabled">
      @for (calc of defaultCalcs; track $index) {
        <option [ngValue]="calc.data">
          {{calc.label}}
        </option>
      }
    </select>
    <button class="btn btn-default"
      [disabled]="!aggregate.calculateInfo && !customCalc || !enabled"
      (click)="openCalculateDialog()">
      _#(Edit)
    </button>
  </div>
  <label><span>_#(Trend and Comparison)</span></label>
</div>

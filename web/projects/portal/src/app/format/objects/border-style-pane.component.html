<div [class.disabled]="isNullSelectedBorder()">
  <button #dropdown
          class="form-control custom-select-trigger border-style-trigger no-caret"
          [class.border-style-trigger--open]="open"
          [disabled]="isNullSelectedBorder()"
          [fixedDropdown]="dropdownMenu"
          [style.white-space]="'nowrap'"
          (openChange)="handleOpenChange($event)"
          data-test="border-style-dropdown">
    @if (!cssClass) {
      <span class="line-label border-style-trigger__content">{{label}}</span>
    }
    @if (cssClass) {
      <div [class]="'line-display border-style-trigger__content ' + cssClass"></div>
    }
    <i class="border-style-trigger__icon dropdown-caret icon-color-default"
       [class.chevron-up-icon]="open"
       [class.chevron-down-icon]="!open"
       aria-hidden="true"></i>
  </button>
</div>
<ng-template #dropdownMenu>
  <ul role="menu" class="dropdown-pane">
    @for (style of styles; track $index) {
      <li class="line-style hover-bg-primary-selectable"
        [class.selected]="style.value == currentBorderStyle"
        [class.fade]="style.value == '1'"
        (click)="setBorderStyle($event, style.value)">
        @if (style.label) {
          <label class="line-label border-style-trigger__content">{{style.label}}</label>
        }
        @if (style.cssClass) {
          <div [class]="'line-display ' + style.cssClass"></div>
        }
      </li>
    }
  </ul>
</ng-template>

<div #inputDropdown class="custom-select-trigger tree-dropdown-trigger form-control unhighlightable"
     [ngClass]="{disabled: isDisabled}"
     [attr.tabindex]="isDisabled ? -1 : 0"
     [fixedDropdown]="dropdownMenu" dropdownPlacement="bottom" [autoClose]="false"
     (openChange)="handleOpenChange($event)">
  <div class="label-container custom-select-trigger__text" [title]="currentLabel">
    {{currentLabel}}
  </div>
  <i class="custom-select-trigger__icon dropdown-caret icon-color-default"
     [class.chevron-down-icon]="!open"
     [class.chevron-up-icon]="open"
     aria-hidden="true">
  </i>
</div>
<ng-template #dropdownMenu>
  <div class="tree-dropdown-menu custom-select-menu dropdown-pane"
       [style.min-width.px]="dropdownMinWidth">
    <tree [root]="root" [showRoot]="false" [iconFunction]="iconFunction"
          [selectedNodes]="selectedNodes" [showTooltip]="true"
          [initSelectedNodesExpanded]="expandSelectedNodes"
          (nodeExpanded)="nodeExpanded.emit($event)"
          (nodesSelected)="onTreeNodeSelect($event[0])"></tree>
  </div>
</ng-template>

<modal-header [title]="'_#(Add Join)'"
   [cshid]="'DatabaseQuery'"
   (onCancel)="close()">
</modal-header>
<div class="modal-body" [enterSubmit]="formValid" (onEnter)="ok()">
  <div class="container-fluid">
    <div class="row form-row-checkbox" [style.visibility]="">
      <ng-template #emptyBlock><div>&nbsp;</div></ng-template>
      <ng-container *ngIf="join.operator === '='; else emptyBlock">
        <div class="col-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" [ngModel]="join.all1" id="all"
                 (ngModelChange)="join.all1 = $event; validate()">
            <label class="form-check-label" for="all">
              _#(All)
            </label>
          </div>
        </div>
        <div class="col-4"></div>
        <div class="col-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" [ngModel]="join.all2" id="all2"
                 (ngModelChange)="join.all2 = $event; validate()">
            <label class="form-check-label" for="all2">
              _#(All)
            </label>
          </div>
        </div>
      </ng-container>
    </div>
    <div class="row form-row-float-label">
      <div class="col-4">
        <custom-select [options]="tableSelectOptions"
                       [(ngModel)]="join.table1"
                       (ngModelChange)="tableChange($event, true)">
        </custom-select>
      </div>
      <div class="col-4"></div>
      <div class="col-4">
        <custom-select [options]="tableSelectOptions"
                       [(ngModel)]="join.table2"
                       (ngModelChange)="tableChange($event, false)">
        </custom-select>
      </div>
    </div>
    <div class="row form-row-float-label">
      <div class="col-4">
        <custom-select [options]="column1SelectOptions"
                       [ngModel]="tempColumn1"
                       (ngModelChange)="tempColumn1 = $event; validate()"
                       [disabled]="columns1 == null">
        </custom-select>
      </div>
      <div class="col-4">
        <custom-select [options]="operatorSelectOptions"
                       [ngModel]="join.operator"
                       (ngModelChange)="changeOperator($event)">
        </custom-select>
      </div>
      <div class="col-4">
        <custom-select [options]="column2SelectOptions"
                       [ngModel]="tempColumn2"
                       (ngModelChange)="tempColumn2 = $event; validate()"
                       [disabled]="columns2 == null">
        </custom-select>
      </div>
    </div>
    <div *ngIf="error" class="alert alert-danger">{{error}}</div>
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="ok()" [disabled]="error" #okButton>_#(OK)</button>
  <button type="button" class="btn btn-default" data-dismiss="modal" (click)="close()">_#(Cancel)</button>
</div>

<modal-header [title]="'_#(Add Join)'"
  [cshid]="'DatabaseQuery'"
  (onCancel)="close()">
</modal-header>
<div class="modal-body" [enterSubmit]="formValid" (onEnter)="ok()">
  <div class="container-fluid">
    <div class="shell-form-row shell-form-row--checkbox" [style.visibility]="">
      @if (join.operator === '=') {

        <div class="col-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" [ngModel]="join.all1" id="all"
                 (ngModelChange)="join.all1 = $event; validate()">
            <label class="form-check-label" for="all">
              _#(All)
            </label>
          </div>
        </div>
        <div class="col-4"></div>
        <div class="col-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" [ngModel]="join.all2" id="all2"
                 (ngModelChange)="join.all2 = $event; validate()">
            <label class="form-check-label" for="all2">
              _#(All)
            </label>
          </div>
        </div>
      
} @else {
<div>&nbsp;</div>
}
    </div>
    <div class="row shell-form-row--field">
      <div class="col-4">
        <custom-select [options]="tableSelectOptions"
                       [(ngModel)]="join.table1"
                       (selectionChange)="tableChange($event, true)">
        </custom-select>
      </div>
      <div class="col-4"></div>
      <div class="col-4">
        <custom-select [options]="tableSelectOptions"
                       [(ngModel)]="join.table2"
                       (selectionChange)="tableChange($event, false)">
        </custom-select>
      </div>
    </div>
    <div class="row shell-form-row--field">
      <div class="col-4">
        <select class="form-control" [ngModel]="columns1?.indexOf(tempColumn1)" (ngModelChange)="tempColumn1 = columns1[$event]; validate()" [disabled]="columns1 == null">
          @for (_col of columns1; track _col; let _i = $index) {
<option [ngValue]="_i">{{_col.properties.attribute}}</option>
}
        </select>
      </div>
      <div class="col-4">
        <custom-select [options]="operatorSelectOptions"
                       [ngModel]="join.operator"
                       (selectionChange)="changeOperator($event)">
        </custom-select>
      </div>
      <div class="col-4">
        <select class="form-control" [ngModel]="columns2?.indexOf(tempColumn2)" (ngModelChange)="tempColumn2 = columns2[$event]; validate()" [disabled]="columns2 == null">
          @for (_col of columns2; track _col; let _i = $index) {
<option [ngValue]="_i">{{_col.properties.attribute}}</option>
}
        </select>
      </div>
    </div>
    @if (error) {
<div class="shell-alert shell-alert--danger">{{error}}</div>
}
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="ok()" [disabled]="error" #okButton>_#(OK)</button>
  <button type="button" class="btn btn-default" data-dismiss="modal" (click)="close()">_#(Cancel)</button>
</div>

<div class="bordered-box scroll-pane sql-query-dialog-list__surface" (dragover)="dragOverContainer($event)"
  (dragleave)="dragLeave()" (drop)="drop($event, insertPositionDragOverContainer($event))">
  @for (_item of items; track _item; let _i = $index) {
    <div #item
      class="item-entry unhighlightable text-overflow sql-query-dialog-list__item"
       [ngClass]="{'selected': selectedIndexes.indexOf(_i) >= 0,
                   'bb-highlight-thin': insertPosition === _i + 1,
                   'bt-highlight-thin': _i === 0 && insertPosition === 0,
                   'drop-target': dragService.currentlyDragging}"
      [attr.title]="getLabel(_item)"
      (dragover)="dragOverItem($event, _i)"
      (mousedown)="indexSelected(_i)" (drop)="drop($event, insertPositionDragOverItem($event, _i))"
      [draggable]="reorderName != null" (dragstart)="dragListItems($event)">
      <span class="item-label">
        {{getLabel(_item)}}
      </span>
      <span class="btn-group">
        @if (showEdit) {
          <button type="button" class="btn btn-xs btn-light" title="_#(Edit)"
            (click)="itemEdited.emit(_item)">
            <span class="edit-icon icon-size-medium"></span>
          </button>
        }
        @if (showDelete) {
          <button type="button" class="btn btn-xs btn-light" title="_#(Delete)"
            (click)="deleteItem(_i)">
            <span class="trash-icon icon-size-medium"></span>
          </button>
        }
      </span>
    </div>
  }
  @if ((!items || items.length === 0) && insertPosition != null) {
    <div
      class="empty-entry bb-highlight-thin unhighlightable text-overflow sql-query-dialog-list__empty"
    (drop)="drop($event, 0)"></div>
  }
</div>

<table class="table table-bordered table-sm value-range-table-header">
  <thead>
    <tr>
      <th>_#(Label)</th>
      <th>_#(Range)</th>
    </tr>
  </thead>
</table>
<div class="value-range-table-shell">
  <table class="table table-bordered table-hover table-sm table-layout-fixed w-100 value-range-table">
    <tbody>
      @for (_range of rangeList; track _range; let _i = $index) {
        <tr (click)="select(_i)"
          [class.selected]="_i === selectedIndex">
          <td>
            <input #input class="value-range-table-input form-control" [ngModel]="_range.label"
              (ngModelChange)="editLabel(_i, $event)">
          </td>
          <td class="value-range-table-data" [attr.title]="_range.key">{{_range.key}}</td>
        </tr>
      }
    </tbody>
  </table>
</div>

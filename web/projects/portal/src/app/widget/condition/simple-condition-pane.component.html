<div class="container-fluid">
  <div class="row">
    <div class="selectable-list col-12 simple-condition-pane__list">
      <div *ngFor="let item of conditionList; let even = even; let i = index;"
           class="unhighlightable simple-condition-pane__list-item"
           [class.selected]="selectedIndex == i" (click)="conditionItemSelected(i)">
        <div *ngIf="even" class="simple-condition-pane__list-text">
          {{item | conditionToString}}
        </div>
        <div *ngIf="!even" class="simple-condition-pane__list-text">
          {{item | junctionOperatorToString}}
        </div>
      </div>
    </div>
  </div>
  <div class="condition-editor-header">
    <div class="condition-editor-header__title">
      _#(Select an existing filter to edit)
    </div>
    <div class="condition-editor-header__actions">
      <button type="button" class="btn btn-secondary" (click)="more()">_#(More)</button>
      <button type="button" class="btn btn-default ms-1" (click)="fewer()"
              [disabled]="this.selectedIndex == null || this.selectedIndex % 2 != 0">_#(Fewer)</button>
    </div>
  </div>
</div>
<fieldset class="condition-editor-fieldset">
  <div class="condition-item-container">
    <condition-item-pane *ngIf="condition != null" [provider]="provider" [variableNames]="variableNames"
                         [subqueryTables]="subqueryTables" [fields]="fields"
                         [condition]="condition" [isVSContext]="isVSContext"
                         [showOriginalName]="true"
                         (conditionChange)="conditionChange($event)"
                         [addNoneItem]="false">
    </condition-item-pane>
  </div>
</fieldset>

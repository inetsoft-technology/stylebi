<modal-header [title]="'_#(Subquery)'"
  (onCancel)="cancel()"
  [cshid]="'DataBlockConditions'">
</modal-header>
<div class="modal-body">
  <form ngNoForm (submit)="$event.preventDefault()">
    <fieldset>
      <legend>_#(Retrieve data from)</legend>
      <div class="row shell-form-row--field">
        <div class="col form-floating">
          <custom-select [options]="subqueryTableSelectOptions"
                         [ngModel]="value.query"
                         (selectionChange)="changeSelectedTable($event)">
          </custom-select>
          <label>_#(Subquery)</label>
        </div>
      </div>
      <div class="row shell-form-row--field">
        <div class="col form-floating">
          <custom-select [options]="attributeSelectOptions"
                         [ngModel]="value.attribute"
                         (selectionChange)="attributeChanged($event)">
          </custom-select>
          <label>_#(In column)</label>
        </div>
      </div>
      @if (!isValid()) {
        <div class="shell-alert shell-alert--danger">
          _#(identification.columns.empty.or.nonempty)
        </div>
      }
    </fieldset>
    <fieldset>
      <legend>_#(Where)</legend>
      <div class="row shell-form-row--field">
        <div class="col form-floating">
          <custom-select [options]="subAttributeSelectOptions"
                         [ngModel]="value.subAttribute"
                         (selectionChange)="subAttributeChanged($event)">
          </custom-select>
          <label>_#(Subquery column)</label>
        </div>
      </div>
      <div class="row shell-form-row--field">
        <div class="col ms-2"><strong>=</strong></div>
      </div>
      <div class="row shell-form-row--field">
        <div class="col form-floating">
          <custom-select [options]="mainAttributeSelectOptions"
                         [ngModel]="value.mainAttribute"
                         (selectionChange)="mainAttributeChanged($event)">
          </custom-select>
          <label>_#(Current table column)</label>
        </div>
      </div>
    </fieldset>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="ok()" [disabled]="!isValid()">_#(OK)</button>
  <button type="button" class="btn btn-default" data-dismiss="modal" (click)="cancel()">_#(Cancel)</button>
</div>

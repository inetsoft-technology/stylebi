<div blockMouse>
  <modal-header
    [title]="'_#(Select Palette)'"
    (onCancel)="cancelChanges()">
  </modal-header>
  @if (colorPalettes) {
    <div class="modal-body">
      <!--palette selector-->
      @if (colorPalettes) {
        <div class="palette-row">
          <div class="form-floating">
            <select class="palette-cell" class="form-control"
              [(ngModel)]="_selectedIndex">
              @for (p of colorPalettes; track p; let i = $index) {
                <option [value]="i">
                  {{p.name}}
                </option>
              }
            </select>
            <label>_#(Select Palette)</label>
          </div>
        </div>
      }
      <!--display colors of the selected palette-->
      @if (displayPalette) {
        <div class="color-cell-container">
          @for (color of displayPalette.colors; track color; let i = $index) {
            <span>
              <label class="color-cell" [ngStyle]="{'background-color': color}">
              </label>
              @if ((i + 1) % 8 == 0) {
                <br/>
              }
            </span>
          }
        </div>
      }
      <div>
        <div class="form-check">
          <input type="checkbox" class="form-check-input" [(ngModel)]="_reversed" id="reverse"/>
          <label class="form-check-label" for="reverse">
            _#(Reverse)
          </label>
        </div>
      </div>
    </div>
  }
  <div class="modal-footer">
    <button type="submit" class="btn btn-primary" (click)="saveChanges()">_#(OK)</button>
    <button type="button" class="btn btn-default" data-dismiss="modal" (click)="cancelChanges()">
    _#(Cancel)</button>
  </div>
</div>

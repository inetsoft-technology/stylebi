@if (type == 'TIME_INSTANT') {
  <time-instant-value-editor [(ngModel)]="value" (ngModelChange)="valueChanged($event)" [format]="DATE_FORMAT" [disabled]="!enabled"></time-instant-value-editor>
}
@if (type == 'DATE') {
  <date-value-editor [(ngModel)]="value" (ngModelChange)="valueChanged($event)" [format]="DATE_FORMAT" [disabled]="!enabled"></date-value-editor>
}
@if (type == 'TIME') {
  <time-value-editor [model]="value" (timeChange)="valueChanged($event)" [format]="DATE_FORMAT" [disabled]="!enabled"></time-value-editor>
}

@if (required && value == null) {
  <div>
    <div class="shell-alert shell-alert--danger">_#(enter.date)</div>
  </div>
}

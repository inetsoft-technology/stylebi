<number-stepper [formControl]="valueControl" [min]="min" [max]="max"
               [invalid]="valueControl.invalid">
</number-stepper>
<span class="invalid-feedback d-block" *ngIf="valueControl.getError('required')">_#(enter.number)</span>
<span class="invalid-feedback d-block" *ngIf="valueControl.getError('min')">The number must be greater than or equal to {{min}}</span>
<span class="invalid-feedback d-block" *ngIf="valueControl.getError('max')">The number must be less than or equal to {{max}}</span>

<button type="button" class="ns-btn"
        [disabled]="isDecrementDisabled"
        [attr.aria-disabled]="isDecrementDisabled"
        aria-label="_#(Decrease)"
        (click)="onDecrementClick()"
        (mousedown)="$event.preventDefault(); startHold(-1)"
        (mouseup)="cancelHold()"
        (mouseleave)="cancelHold()">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path d="M3 8h10" stroke-linecap="round"/>
  </svg>
</button>

<div class="ns-input-wrap">
  <input #inputRef
         type="number"
         class="form-control"
         role="spinbutton"
         [value]="displayValue"
         [disabled]="isDisabled"
         [attr.id]="id"
         [attr.aria-label]="ariaLabel"
         [attr.aria-valuemin]="min"
         [attr.aria-valuemax]="max"
         [attr.aria-valuenow]="value"
         [attr.inputmode]="inputmode"
         (input)="onInputChange($event)"
         (blur)="onInputBlur()"
         (keydown)="onInputKeydown($event)"
         (wheel)="onWheel($event)"/>
  @if (unit) {
  <span class="ns-unit" aria-hidden="true">{{unit}}</span>
}
</div>

<button type="button" class="ns-btn"
        [disabled]="isIncrementDisabled"
        [attr.aria-disabled]="isIncrementDisabled"
        aria-label="_#(Increase)"
        (click)="onIncrementClick()"
        (mousedown)="$event.preventDefault(); startHold(1)"
        (mouseup)="cancelHold()"
        (mouseleave)="cancelHold()">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path d="M8 3v10M3 8h10" stroke-linecap="round"/>
  </svg>
</button>

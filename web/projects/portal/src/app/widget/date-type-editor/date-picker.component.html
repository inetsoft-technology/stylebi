<div class="date-pane">
  <!--month selector-->
  <div class="row month-year-row" blockMouse>
    @if (months) {
      <div class="col-6 form-floating">
        <custom-select [options]="months"
                       [ngModel]="dateTime.months"
                       (selectionChange)="selectMonth($event)"
                       ariaLabel="_#(Select a Month)">
        </custom-select>
        <label>_#(Select a Month)</label>
      </div>
    }
    <!--year selector-->
    @if (years) {
      <div class="col-6 form-floating">
        <custom-select [options]="years"
                       [ngModel]="dateTime.years"
                       (selectionChange)="selectYear($event)"
                       ariaLabel="_#(Select a Year)">
        </custom-select>
        <label>_#(Select a Year)</label>
      </div>
    }
  </div>

  <!--display week of the month-->
  <div class="container">
    <table class="table-sm data-table">
      <thead>
        <tr class="date-time-table-header bg-darken1">
          @for (day of dateHeaders; track day) {
            <td>{{day}}</td>
          }
        </tr>
      </thead>
      <tbody>
        @for (cell of calendarCells; track $index) {
          <tr>
            @for (day of cell; track $index) {
              <td>
                @if (day > 0) {
                  <div (mousedown)="selectDay(day)" class="day-div hover-bg-neutral"
                  [class.select-date]="dateTime.date == day">{{day}}</div>
                }
              </td>
            }
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

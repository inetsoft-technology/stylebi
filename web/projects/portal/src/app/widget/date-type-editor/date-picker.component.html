<div class="date-pane">
  <!--month selector-->
  <div class="row month-year-row" blockMouse>
    @if (months) {
      <div class="col-6 form-floating">
        <select class="form-control" [ngModel]="dateTime.months" (ngModelChange)="selectMonth($event)">
          @for (month of months; track month) {
            <option [value]="month.value">
              {{month.label}}
            </option>
          }
        </select>
        <label>_#(Select a Month)</label>
      </div>
    }
    <!--year selector-->
    @if (years) {
      <div class="col-6 form-floating">
        <select class="form-control" [ngModel]="dateTime.years" (ngModelChange)="selectYear($event)">
          @for (year of years; track year) {
            <option [value]="year.value">
              {{year.label}}
            </option>
          }
        </select>
        <label>_#(Select a Year)</label>
      </div>
    }
  </div>

  <!--display week of the month-->
  <div class="container">
    <table class="table-sm data-table">
      <thead>
        <tr class="date-time-table-header bg-darken1">
          @for (day of dateHeaders; track day) {
            <td>{{day}}</td>
          }
        </tr>
      </thead>
      <tbody>
        @for (cell of loadCalender(dateTime.months, dateTime.years); track cell) {
          <tr>
            @for (day of cell; track day) {
              <td>
                @if (day > 0) {
                  <div (mousedown)="selectDay(day)" class="day-div hover-bg-secondary"
                  [class.select-date]="dateTime.date == day">{{day}}</div>
                }
              </td>
            }
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

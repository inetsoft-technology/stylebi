<div class="input-group w-100" blockMouse>
  <button id="split-button" class="dropdown-button custom-select-trigger no-caret form-control" type="button"
          [disabled]="disabled" [class.disabled]="disabled" [fixedDropdown]="dropdownMenu"
          [autoClose]="isOk" [zIndex]="zIndex" (openChange)="toggled($event)">
    <span class="custom-select-trigger__text">{{label ? label : "&nbsp;"}}</span>
    <i class="custom-select-trigger__icon dropdown-caret icon-color-default"
       [class.chevron-up-icon]="open"
       [class.chevron-down-icon]="!open"
       aria-hidden="true"></i>
  </button>
  <ng-template #dropdownMenu>
    <div class="dropdown-pane">
      <ng-content></ng-content>
    </div>
  </ng-template>
</div>

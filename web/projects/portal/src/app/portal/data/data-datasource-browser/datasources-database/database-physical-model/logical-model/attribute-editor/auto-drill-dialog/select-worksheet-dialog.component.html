<modal-header [title]="'_#(Query Selection)'" [cshid]="'AutoDrill'" (onCancel)="cancel()">
</modal-header>
<div class="modal-body select-worksheet-dialog" enterSubmit (onEnter)="ok()" (onEsc)="cancel()">
  <fieldset>
    <legend>
      <div class="select-worksheet-legend">
        _#(Select a Worksheet)
      </div>
    </legend>
    <div class="select-worksheet-dialog__tree-shell tree-container">
      <asset-tree [datasources]="false" [columns]="false" [viewsheets]="false"
        [readOnly]="true"
        [dataSourcePath]="selectedEntry?.path"
        [dataSourceScope]="selectedEntry?.scope"
        (nodeSelected)="selectWorksheet($event)">
      </asset-tree>
    </div>
  </fieldset>
  @if (queryParams != null && queryParams.length != 0) {
    <fieldset class="select-worksheet-dialog__section parameter-container">
      <legend>
        <div class="new-viewsheet-legend">
          _#(Values for Query Parameters)
        </div>
      </legend>
      <div class="parameter-content select-worksheet-dialog__parameter-content">
        @for (param of queryParams; track param; let i = $index) {
          <div #dropdownBody class="field-combo" [class.form-group]="i != queryParams.length - 1">
            <div #dropDownToggle class="field-combo-toggle custom-select-trigger form-floating form-control no-caret"
              [fixedDropdown]="dropdownMenu" [autoClose]="closeMenu"
              dropdownPlacement="bottom">
              <div class="field-combo-text custom-select-trigger__text select-worksheet-dialog__field-text">
                {{getSelectedParamVal(param)}}&nbsp;
              </div>
              <label class="base-font-size"><span>{{param}}</span></label>
            </div>
          </div>
          <ng-template #dropdownMenu>
            <div class="dropdown-pane custom-select-menu field-combo-dropdown" [style.min-width.px]="dropdownMinWidth">
              @if (entities) {
                <select-attribute-pane [entities]="entities" [info]="getSelectedInfo(param)"
                  (onSelectItem)="selectItem($event, param)">
                </select-attribute-pane>
              }
              <select-query-field-pane [fields]="fields" [selectedField]="getSelectedParamVal(param)"
                (onSelectField)="selectItem($event, param)">
              </select-query-field-pane>
            </div>
          </ng-template>
        }
      </div>
    </fieldset>
  }
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-default" (click)="ok()" [disabled]="okDisabled()">_#(OK)</button>
  <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">_#(Cancel)</button>
  <button type="button" class="btn btn-default" (click)="clear()">_#(Clear)</button>
</div>

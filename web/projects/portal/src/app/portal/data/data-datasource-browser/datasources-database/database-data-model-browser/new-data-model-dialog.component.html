<modal-header [title]="'_#(New Data Model)'"
              (onCancel)="cancel()">
</modal-header>
<div class="modal-body">
  <div class="new-data-model-dialog__intro">
    _#(Data models are built in stages. Start with a physical view, then create logical models and VPMs as needed.)
  </div>

  <div class="new-data-model-dialog__options">
    <button type="button"
            class="new-data-model-dialog__option new-data-model-dialog__option--primary"
            (click)="select('physical')">
      <div class="new-data-model-dialog__option-title">_#(Physical View)</div>
      <div class="new-data-model-dialog__option-copy">
        _#(Start here. Combine and shape source tables into the foundation for later models.)
      </div>
      <div class="new-data-model-dialog__option-action">_#(Create Physical View)</div>
    </button>

    <button type="button"
            class="new-data-model-dialog__option"
            [class.disabled]="!canCreateLogicalModel"
            [disabled]="!canCreateLogicalModel"
            (click)="select('logical')">
      <div class="new-data-model-dialog__option-title">_#(Logical Model)</div>
      <div class="new-data-model-dialog__option-copy">{{logicalModelHint}}</div>
      <div class="new-data-model-dialog__option-action">_#(Create Logical Model)</div>
    </button>

    <button type="button"
            class="new-data-model-dialog__option"
            [class.disabled]="!canCreateVpm"
            [disabled]="!canCreateVpm"
            (click)="select('vpm')">
      <div class="new-data-model-dialog__option-title">_#(VPM)</div>
      <div class="new-data-model-dialog__option-copy">{{vpmHint}}</div>
      <div class="new-data-model-dialog__option-action">_#(Create VPM)</div>
    </button>
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-default" (click)="cancel()">
    _#(Cancel)
  </button>
</div>

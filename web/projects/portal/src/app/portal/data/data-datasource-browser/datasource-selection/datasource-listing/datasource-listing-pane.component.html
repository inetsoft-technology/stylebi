<div class="datasource-listing-pane">
  <div class="datasource-listing-pane__header">
    <div>
      <div class="datasource-listing-pane__eyebrow">_#(Connector Types)</div>
      <div class="datasource-listing-pane__title">_#(Choose a Data Source)</div>
    </div>
  </div>
  <div class="datasource-listing-grid">
  <datasource-listing *ngFor="let _listing of listings"
                      class="datasource-listing-grid__item"
                      [class.bg-selected]="_listing.name === selectedListingName"
                      [listing]="_listing"
                      [selected]="_listing.name === selectedListingName"
                      (dblclick)="submitted.emit(_listing.name)"
                      (mousedown)="select(_listing)"
                      (touchstart)="select(_listing)"></datasource-listing>
  <p *ngIf="listings.length === 0" class="datasource-listing-grid__empty">_#(No listings found).</p>
  </div>
</div>

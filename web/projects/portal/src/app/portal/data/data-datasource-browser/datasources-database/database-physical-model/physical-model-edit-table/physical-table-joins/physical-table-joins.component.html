<div class="physical-table-joins-pane flex-fixed-container h-100">
  <div class="physical-table-joins-pane__header">
    <div class="physical-table-joins-pane__heading">
      <div class="physical-table-joins-pane__eyebrow">_#(Joins)</div>
      <div class="physical-table-joins-pane__title" [attr.title]="table?.qualifiedName">
        {{table?.qualifiedName}}
      </div>
      <div class="physical-table-joins-pane__subtitle">
        _#(Manage relationships from this table to other tables in the physical view.)
      </div>
    </div>
    <div class="outjoin-toolbar toolbar-ghost-actions" role="toolbar" aria-label="_#(Joins)">
      <button role="button" class="btn btn-sm btn-light-no-bg" [disabled]="disabled"
              [attr.title]="'_#(data.physicalmodel.addJoinTooltip)'"
              (click)="addJoin()">
        <i class="add-icon"></i>
      </button>
      <button role="button" class="btn btn-sm btn-light-no-bg"
              [disabled]="isDeleteDisabled()"
              [attr.title]="'_#(data.physicalmodel.removeJoinTooltip)'"
              (click)="removeJoin()">
        <i class="trash-icon"></i>
      </button>
      <button role="button" class="btn btn-sm btn-light-no-bg"
              [disabled]="isEditJoinDisabled()"
              [attr.title]="'_#(data.physicalmodel.editJoinTooltip)'"
              (click)="editJoin()">
        <i class="edit-icon"></i>
      </button>
    </div>
  </div>
  <div class="outgoing-tree-pane flex-fixed-content content-overflow-all d-inline-flex p-1">
    <div class="physical-table-joins-pane__empty" *ngIf="!foreignTableRoot.children?.length">
      _#(No joins yet. Add a join to connect this table to another table in the physical view.)
    </div>
    <tree *ngIf="foreignTableRoot.children?.length"
          #joinsTree class="outgoing-tree"
          [root]="foreignTableRoot"
          [showRoot]="false"
          [showIcon]="false"
          [multiSelect]="true"
          [disabled]="disabled"
          [selectedNodes]="selectedNodes"
          (nodesSelected)="selectNode($event)">
    </tree>
  </div>
</div>
<ng-template #addJoinDialog let-close="close" let-dismiss="dismiss">
  <add-join-dialog (onCommit)="close($event)" (onCancel)="dismiss($event)"
                   [database]="databaseName" [id]="physicalModel.id"
                   [table]="table" [tables]="physicalModel.tables" >
  </add-join-dialog>
</ng-template>
<ng-template #editJoinDialog let-close="close" let-dismiss="dismiss">
  <edit-join-dialog (onCommit)="close($event)" (onCancel)="dismiss($event)"
                    [removeEnabled]="false" [joinModel]="editJoinModel">
  </edit-join-dialog>
</ng-template>

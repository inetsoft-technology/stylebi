<div class="data-sources-browser-shell">
  <nav *ngIf="showBreadcrumb"
     aria-label="breadcrumb" role="navigation"
     [ngbTooltip]="breadcrumbTooltip"
     triggers="mouseenter:mouseleave" placement="right">
    <ol class="breadcrumb data-sources-browser__breadcrumb mb-0">
      <li *ngFor="let folder of browserView?.path; last as isLast"
          class="breadcrumb-item"
          [class.active]="isLast">
        <span [class.action-style]="!isLast"
              (click)="isLast || openFolder(folder.path, folder.type)">{{getFolderName(folder)}}
        </span>
      </li>
    </ol>
  </nav>
  <div class="data-sources-browser__list" *ngIf="!!browserView">
    <div *ngIf="browserView.path?.length > 1"
        class="data-sources-browser__item data-sources-browser__item--parent"
        (click)="openParentFolder()">
      <div class="data-sources-browser__item-main">
        <span class="data-sources-browser__item-icon-shell">
          <i class="upward-icon"></i>
        </span>
        <span class="data-sources-browser__item-label">{{parentFolderName()}}</span>
      </div>
    </div>
    <div class="data-sources-browser__item" *ngFor="let folder of browserView.folders"
            [class.active]="!multiSelect && isItemSelected(folder, true)"
            (dblclick)="folderSelectable ? dblclickFolder(folder.path, folder.hasSubFolder, folder.type) : null"
            (click)="folderSelectable ? selectFolder(folder) : openFolder(folder.path, folder.type)">
      <div class="data-sources-browser__item-main">
        <input type="checkbox" class="data-sources-browser__checkbox"
                 *ngIf="multiSelect && folderSelectable"
                 [checked]="isItemSelected(folder, true)"
                 (click)="selectFolder(folder); $event.stopPropagation()">
        <span class="data-sources-browser__item-icon-shell">
          <i class="{{getFolderIcon(folder)}}"></i>
        </span>
        <span class="data-sources-browser__item-label">{{getFolderName(folder)}}</span>
      </div>
      <span class="data-sources-browser__item-trailing" *ngIf="folder.hasSubFolder">
        <i *ngIf="folder.hasSubFolder"
           class="forward-icon cursor-pointer"
           (click)="openFolder(folder.path, folder.type); $event.stopPropagation()">
        </i>
      </span>
    </div>
    <div class="data-sources-browser__item" *ngFor="let file of browserView.files"
            [class.active]="!multiSelect && isItemSelected(file, false)"
            (click)="selectFile(file)">
      <div class="data-sources-browser__item-main">
        <input type="checkbox" class="data-sources-browser__checkbox"
               *ngIf="multiSelect"
               [checked]="isItemSelected(file, false)"
               (click)="selectFile(file); $event.stopPropagation()">
        <span class="data-sources-browser__item-icon-shell">
          <i class="{{getFileIcon(file)}}"></i>
        </span>
        <span class="data-sources-browser__item-label">{{file.name}}</span>
      </div>
    </div>
  </div>
</div>

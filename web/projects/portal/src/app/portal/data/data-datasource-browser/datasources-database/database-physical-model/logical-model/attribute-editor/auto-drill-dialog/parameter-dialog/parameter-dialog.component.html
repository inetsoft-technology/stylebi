<modal-header [title]="'_#(Parameter)'"
              [cshid]="'AutoDrillPortal'"
              (onCancel)="close()">
</modal-header>
<div class="modal-body parameter-dialog" *ngIf="model && form">
  <form [formGroup]="form" class="parameter-dialog__form">
    <div class="shell-form-group form-floating">
      <div class="input-group">
        <input #inputFocus class="form-control" type="text" formControlName="name"
               [class.is-invalid]="!nameControl.valid"
               [(ngModel)]="variable"/>
        <custom-select *ngIf="parameterNameSelectOptions.length > 0"
                       class="parameter-name-picker"
                       [options]="parameterNameSelectOptions"
                       [ngModel]="variable"
                       [ngModelOptions]="{standalone: true}"
                       (selectionChange)="selectVariable($event)"
                       ariaLabel="_#(Parameter Name)"
                       placeholder="_#(Select)">
        </custom-select>
      </div>
      <label><span>_#(Parameter Name)</span></label>
      <span class="invalid-feedback" *ngIf="!nameControl.valid">
        {{getFirstErrorMessage(nameControl)}}
      </span>
    </div>
    <div class="shell-form-group parameter-dialog__source-row">
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio"
               [ngModel]="source"
               (ngModelChange)="updateParamType($event)"
               [value]="SourceType.FIELD"
               [ngModelOptions]="{standalone: true}">
        <label class="form-check-label">_#(Field)</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio"
               [ngModel]="source"
               (ngModelChange)="updateParamType($event)"
               [value]="SourceType.CONSTANT"
               [ngModelOptions]="{standalone: true}">
        <label class="form-check-label">_#(Constant)</label>
      </div>
    </div>
    <div class="shell-form-group form-floating" *ngIf="source == SourceType.FIELD">
      <custom-select [options]="fieldSelectOptions"
                     [(ngModel)]="model.field"
                     formControlName="value">
      </custom-select>
      <label><span>_#(Field)</span></label>
    </div>
    <div class="shell-form-group form-floating" *ngIf="source == SourceType.CONSTANT">
      <custom-select [options]="typeSelectOptions"
                     [(ngModel)]="model.type"
                     (selectionChange)="changeType($event)"
                     formControlName="type">
      </custom-select>
      <label><span>_#(Type)</span></label>
    </div>
    <div class="shell-form-group" [class.g-0]="model.type == XSchema.BOOLEAN" *ngIf="source == SourceType.CONSTANT">
      <ng-container *ngIf="model.type == XSchema.BOOLEAN">
        <div class="form-check form-check-inline">
          <label class="form-check-label value-for-parameter-label">
            _#(Parameter Value):
          </label>
          <input type="checkbox" class="form-check-input"
                 formControlName="value" [(ngModel)]="model.field"/>
        </div>
      </ng-container>
      <div class="form-floating has-float-container" *ngIf="model.type != XSchema.BOOLEAN">
        <date-value-editor *ngIf="model.type == XSchema.DATE"
                            formControlName="value"
                            class="w-100"
                            [class.is-invalid]="!valueControl.valid"
                            [model]="model.field"
                            (ngModelChange)="changeValue($event)">
        </date-value-editor>
        <time-value-editor *ngIf="model.type == XSchema.TIME"
                           formControlName="value"
                           [class.is-invalid]="!valueControl.valid"
                           [model]="model.field"
                           class="w-100"
                           (timeChange)="changeValue($event)">
        </time-value-editor>
        <time-instant-value-editor *ngIf="model.type == XSchema.TIME_INSTANT"
                                   class="w-100"
                                   [class.is-invalid]="!valueControl.valid"
                                   formControlName="value"
                                   (timeChange)="changeValue($event)"
                                   [ngModel]="model.field" [fullContainer]="true">
        </time-instant-value-editor>
        <ng-container *ngIf="XSchema.isNumericType(model.type)">
          <number-stepper formControlName="value"
                          (valueChange)="model.field = $event"
                          [inputmode]="'decimal'"
                          [invalid]="!valueControl.valid">
          </number-stepper>
        </ng-container>
        <ng-container *ngIf="XSchema.isStringType(model.type)">
          <input type="text" class="form-control" formControlName="value"
                 [class.is-invalid]="!valueControl.valid"
                 [(ngModel)]="model.field">
        </ng-container>
        <label><span>_#(Parameter Value)</span></label>
        <div class="shell-alert shell-alert--danger" *ngIf="valueControl.getError('required')">
          _#(data.logicalmodel.drillParameterFieldRequired)</div>
        <div class="shell-alert shell-alert--danger" *ngIf="valueControl.getError('maxLength')">
          _#(data.logicalmodel.drillParameterFieldMaxLength)
        </div>
        <div class="shell-alert shell-alert--danger" *ngIf="isInValidTypeRange()">
          _#(data.logicalmodel.drillParameterFieldMaxLength)
        </div>
      </div>
      <div class="shell-alert shell-alert--danger parameter-dialog__inline-alert" *ngIf="!valueControl.getError('required')
           && !isInValidTypeRange() && !valueControl.getError('maxLength')
           && !isValidDataTypeValue(model.field, model.type)">
        _#(data.logicalmodel.drillParameterNumberInvalid)</div>
    </div>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="ok()" [disabled]="okDisabled()">_#(OK)</button>
  <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="close()">_#(Cancel)</button>
</div>

<div class="datasource-search-field">
  <input type="search" class="form-control form-control-sm search-input"
         name="_#(Data source name filter)"
         placeholder="_#(Search data sources)"
         aria-label="_#(Search data sources)"
         [ngModel]="draftSearchString"
         (ngModelChange)="changeSearchString($event)"
         (keyup.enter)="search()">
  <button type="button" class="datasource-search-field__button"
          title="_#(Search)" aria-label="_#(Search)"
          (click)="search()">
    <i class="search-icon icon-size-medium icon-color-default" aria-hidden="true"></i>
  </button>
</div>

<div class="data-model-edit-pane">
  <div class="data-model-toolbar">
    <div class="data-model-toolbar__main">
      <div class="data-model-title">
        <div class="data-model-title__text">
          <div class="data-model-title__eyebrow">_#(Logical Model)</div>
          <span class="data-model-name" [attr.title]="displayTitle">{{displayTitle}}</span>
        </div>
      </div>
    </div>
    <div class="data-model-toolbar__actions">
      <button type="button" class="btn btn-primary"
              [disabled]="!isModified || form.invalid"
              (click)="save()">
        _#(Save)
      </button>
      <button type="button" class="btn btn-default"
              (click)="close()">
        _#(Close)
      </button>
    </div>
  </div>

  <div class="logical-model-content">
    <ng-container>
      <logical-model-property-pane
         [logicalModel]="logicalModel"
         [databaseName]="databaseName"
         [physicalModelName]="physicalModelName"
         [additional]="logicalModel?.connection"
         [originalName]="originalName"
         [editing]="editing"
         [parent]="parent"
         [loading]="loading"
         [form]="form"
         [notifications]="notifications"
         (checkModify)="checkModified()">
      </logical-model-property-pane>
    </ng-container>
  </div>
</div>

<notifications #notifications class="notifications-data-model" [timeout]="5000"></notifications>

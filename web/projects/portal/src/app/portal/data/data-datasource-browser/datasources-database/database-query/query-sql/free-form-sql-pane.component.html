@if (!!model) {
  <div class="free-form-sql-pane">
    <div class="top-container">
      <div class="button-container">
        <div>
          <input type="checkbox" class="form-check-input" id="parseCheckbox"
            [ngModel]="model.parseSql"
            (ngModelChange)="parseSqlChanged($event)">
          <label for="parseCheckbox">_#(Parse SQL)</label>
        </div>
        @if (model.parseSql) {
          <button class="btn btn-default" (click)="parseNow()">_#(Parse Now)</button>
        }
        @if (!model.parseSql) {
          <button class="btn btn-default" [class.highlight-btn]="refreshColumnInfo" (click)="getColumnInfo()">_#(Get Column Info)</button>
        }
        @if (!model.parseSql) {
          <button class="btn btn-default" [disabled]="!model.hasColumnInfo" (click)="clearColumnInfo()">_#(Clear Column Info)</button>
        }
      </div>
      @let statusString = getStatusString();
      <label class="parse-status-label">{{statusString}}</label>
    </div>
    <div class="row">
      <div class="col">
        <textarea class="form-control" rows="26" [(ngModel)]="model.sqlString" (change)="editSqlString()"></textarea>
      </div>
    </div>
  </div>
}

<div class="data-model-folder-browser">
  <nav *ngIf="showBreadcrumb"
       aria-label="breadcrumb" role="navigation"
       [ngbTooltip]="breadcrumbTooltip"
       triggers="mouseenter:mouseleave" placement="right">
    <ol class="breadcrumb data-model-folder-browser__breadcrumb mb-0">
      <li *ngFor="let folder of browserView?.path; last as isLast"
          class="breadcrumb-item"
          [class.active]="isLast">
          <span [class.action-style]="!isLast"
                (click)="isLast || openFolder(folder.path, folder.type)">{{getFolderName(folder)}}
          </span>
      </li>
    </ol>
  </nav>

  <div class="data-model-folder-browser__list" *ngIf="!!browserView">
    <div *ngIf="browserView.path?.length > 1"
         class="data-model-folder-browser__item data-model-folder-browser__item--parent"
         (click)="openParentFolder()">
      <div class="data-model-folder-browser__item-main">
        <span class="data-model-folder-browser__item-icon-shell">
          <i class="upward-icon"></i>
        </span>
        <span class="data-model-folder-browser__item-label">{{parentFolderName()}}</span>
      </div>
    </div>

    <div class="data-model-folder-browser__item"
         *ngFor="let folder of browserView.folders"
         [class.active]="isItemSelected(folder, true)"
         (click)="selectFolder(folder)">
      <div class="data-model-folder-browser__item-main">
        <span class="data-model-folder-browser__item-icon-shell">
          <i class="{{getFolderIcon(folder)}}"></i>
        </span>
        <span class="data-model-folder-browser__item-label">{{getFolderName(folder)}}</span>
      </div>
      <span *ngIf="canOpenFolder(folder)"
            class="data-model-folder-browser__item-trailing">
        <i class="forward-icon cursor-pointer"
           (click)="openFolder(folder.path, folder.type); $event.stopPropagation()">
        </i>
      </span>
    </div>
  </div>
</div>

<div class="logical-model-column-editor">
  <div class="data-model-header-pane logical-model-column-editor__header truncate-parent justify-content-between align-items-center">
    <span class="logical-model-column-editor__title truncate-text">
      _#(data.logicalmodel.attribute.columnProperties)
    </span>
  </div>
  <div class="logical-model-column-editor__content flex-fixed-content content-overflow-all">
    <logical-model-attribute-editor [form]="form"
                                    [databaseName]="databaseName"
                                    [physicalModelName]="physicalModelName"
                                    [additional]="additional"
                                    [attribute]="attribute" [existNames]="existNames"
                                    [logicalModelName]="logicalModelName"
                                    [logicalModelParent]="logicalModelParent"
                                    [entities]="entities"
                                    (onAttributeChanged)="apply()">
    </logical-model-attribute-editor>
  </div>
</div>

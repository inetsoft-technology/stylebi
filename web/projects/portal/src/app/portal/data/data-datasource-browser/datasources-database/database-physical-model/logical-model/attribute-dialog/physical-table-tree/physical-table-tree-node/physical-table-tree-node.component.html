<div class="action-color" *ngIf="showRoot"
     [style.padding-left.px]="indentLevel * INDENT_SIZE">
  <div class="physical-table-tree-node__shell truncate-parent justify-content-between w-100">
    <div class="physical-table-tree-node__row truncate-text d-flex align-items-center w-100 cursor-pointer hover-bg-primary"
         [class.light-gray-bg]="isDisabled()"
         (click)="selectNode($event)"
         (dblclick)="hasChildren() ? toggleNode() : null">
      <span *ngIf="hasChildren()"
            class="{{getToggleIcon()}} physical-table-tree-node__toggle tree-node-toggle cursor-pointer truncate-addon"
            (click)="toggleNode()" (dblclick)="$event.stopPropagation()">
      </span>
      <input class="physical-table-tree-node__checkbox" type="checkbox"
             [checked]="isSelected()" [disabled]="isDisabled()"/>
      <span class="physical-table-tree-node__label truncate-text form-check-label" [attr.title]="node.label">
        {{node ? node.label : ""}}
      </span>
    </div>
  </div>
</div>
<div [class.tree-children]="showRoot" *ngIf="node && node.expanded && node.children">
  <physical-table-tree-node *ngFor="let _node of node.children" [node]="_node"
                            [tree]="tree"
                            [indentLevel]="!showRoot ? indentLevel : indentLevel + 1">
  </physical-table-tree-node>
</div>

<modal-header [title]="'_#(Add Attributes)'"
              [cshid]="'AddAttributes'"
              (onCancel)="cancel()">
</modal-header>
<div class="modal-body logical-model-attribute-dialog">
  <form [formGroup]="form" class="logical-model-attribute-dialog__form">
    <div class="form-group form-floating" #entityDropdown="ngbDropdown" ngbDropdown [autoClose]="true">
      <input #entityTrigger type="text" class="form-control input-dropdown"
             [class.input-dropdown--open]="entityDropdown.isOpen()"
             [value]="selectedEntityName"
             [class.is-invalid]="!!parentControl.errors"
             [disabled]="parentControl.disabled"
             readonly
             ngbDropdownToggle
             #selectFocus>
      <div class="dropdown-caret icon-size-small"
           [class.chevron-down-icon]="!entityDropdown.isOpen()"
           [class.chevron-up-icon]="entityDropdown.isOpen()"></div>
      <label><span>_#(data.logicalmodel.parentEntity)</span></label>
      <span class="invalid-feedback" *ngIf="parentControl.getError('required')">
        _#(data.logicalmodel.parentEntityRequired)
      </span>
      <div ngbDropdownMenu class="dropdown-pane logical-model-attribute-dialog__dropdown-menu"
           [style.width.px]="entityTrigger.offsetWidth"
           [style.min-width.px]="entityTrigger.offsetWidth">
        <button *ngFor="let entity of entities; let i = index"
                type="button"
                class="dropdown-item logical-model-attribute-dialog__dropdown-item"
                [class.selected]="parent === i"
                (click)="selectEntity(i, entityDropdown)">
          {{ entity.name }}
        </button>
      </div>
    </div>
    <div class="form-group">
      <div class="form-floating">
        <div class="logical-model-attribute-dialog__tree-shell">
          <div class="physical-table-tree">
            <physical-table-tree #physicalTree *ngIf="!!tablesRoot"
                                 [root]="tablesRoot" (nodesSelected)="select($event)">
            </physical-table-tree>
          </div>
        </div>
        <label>_#(Select Columns)</label>
      </div>
    </div>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="ok()" [disabled]="!!form.errors" >_#(OK)
  </button>
  <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">_#(Cancel)
  </button>
</div>

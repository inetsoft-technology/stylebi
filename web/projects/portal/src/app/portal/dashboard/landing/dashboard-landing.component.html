<div class="hint-container" *ngIf="model?.dashboards.length == 0">
  <div class="landing-shell">
    <div class="landing-eyebrow">_#(js:Pinboard)</div>
    <div class="landing-title">_#(js:Keep your favored dashboards here)</div>
    <div class="landing-body">
      _#(js:Pin dashboards you return to often so this page becomes your quick access area for everyday analysis.)
    </div>

    <div class="landing-cards">
      <div *ngIf="model?.editable"
           class="landing-card landing-card--clickable"
           (click)="newDashboard()"
           tabindex="-1" role="button" aria-labelledby="dashboardDescription" enterClick>
        <div class="landing-card__icon-wrap">
          <i class="setting-icon icon-size-large" aria-hidden="true"></i>
        </div>
        <div class="landing-card__title">_#(js:Settings)</div>
        <div id="dashboardDescription" class="landing-card__copy">
          _#(js:Use Settings to add dashboards to your pinboard and arrange the ones you want to keep close at hand.)
        </div>
      </div>
    </div>
  </div>
</div>

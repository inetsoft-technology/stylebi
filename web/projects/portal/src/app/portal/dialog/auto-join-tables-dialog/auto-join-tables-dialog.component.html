<modal-header [title]="'_#(Generate Joins)'"
              [cshid]="'EditPhysicalViewAutomaticallyCreateJoins'"
              (onCancel)="cancel()">
</modal-header>
<div class="modal-body">
  <div class="auto-join-dialog">
    <div class="auto-join-dialog__intro">
      _#(Choose how to generate joins, then select the columns to use across the physical view.)
    </div>
    <div class="auto-join-dialog__panel">
      <div class="auto-join-dialog__header">
        <div class="auto-join-dialog__title">
          _#(Join) _#(Properties)
        </div>
      </div>
      <div class="auto-join-dialog__choice-group">
        <div class="auto-join-dialog__choice-row">
          <div class="form-check auto-join-dialog__choice-toggle">
            <input #radioInput class="form-check-input" type="radio"
                   name="joinOnRadio"
                   id="joinOnKeyRelations"
                   [disabled]="!autoJoinColumns.metaAvailable"
                   [value]="false"
                   [(ngModel)]="joinOnName"
                   (ngModelChange)="joinOnChanged()">
            <label class="form-check-label" for="joinOnKeyRelations">
              {{'_#(Key Relations)'}}
            </label>
          </div>
          <div class="form-check auto-join-dialog__choice-toggle">
            <input class="form-check-input" type="radio"
                   name="joinOnRadio"
                   id="joinOnColumnNames"
                   [value]="true"
                   [(ngModel)]="joinOnName"
                   (ngModelChange)="joinOnChanged()">
            <label class="form-check-label" for="joinOnColumnNames">
              {{'_#(Column Names)'}}
            </label>
          </div>
        </div>
      </div>
      <div class="auto-join-dialog__columns-field">
        <div class="auto-join-dialog__section-label">_#(Available Columns)</div>
        <div class="bordered-box bd-gray auto-join-dialog__columns-list">
          <label class="auto-join-dialog__column" *ngFor="let column of availableColumns">
            <input class="auto-join-dialog__column-input" type="checkbox" [(ngModel)]="column.selected">
            <span class="auto-join-dialog__column-label">{{column.label}}</span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="ok()">
    _#(OK)
  </button>
  <button type="button" class="btn btn-secondary" data-dismiss="modal"
          (click)="cancel()">
    _#(Cancel)
  </button>
</div>

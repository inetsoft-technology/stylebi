<form [formGroup]="vform">
   <div class="input-group variable-editor-group" [class.variable-input-group]="varShowDate">
      <input class="form-control" type="text" [class.variable-input]="varShowDate"
         [placeholder]="'_#(Variable Name)'"
         [ngClass]="{'w-100': !varShowDate,
                     'text-low-Priority': !inputFocused && DATE_ITEMS.includes(variableName)}"
         [ngModel]="variableName"
         (ngModelChange)="variableNameChanged($event)"
         (focus)="inputFocused = true"
         formControlName="name"/>
      <custom-select *ngIf="varShowDate"
                     class="variable-date-picker"
                     [options]="dateItemSelectOptions"
                     [ngClass]="{'text-low-Priority': inputFocused}"
                     [ngModel]="variableName"
                     [ngModelOptions]="{standalone: true}"
                     (selectionChange)="selectDateVariable($event)"
                     ariaLabel="_#(Variable Name)"
                     placeholder="_#(Select)">
      </custom-select>
   </div>
</form>

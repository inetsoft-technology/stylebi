<div class="condition-builder" [ngClass]="getContainerClass()">
  <div class="condition-builder__editor-row">
    <div class="condition-builder__editor">
      <vpm-condition-item-pane [provider]="provider"
                               [fields]="fields" [datasource]="provider?.datasource"
                               [(condition)]="condition">
      </vpm-condition-item-pane>
    </div>
    <div class="condition-builder__junctions">
      <div class="condition-builder__junction-card">
        <div class="condition-builder__junction-label-text">_#(Condition Logic)</div>
        <label class="condition-builder__toggle form-check-label not_check_id">
          <input type="checkbox"
                 class="form-check-input"
                 [(ngModel)]="conjunction.isNot"
                 [disabled]="conditionList.length == 0"
                 (ngModelChange)="conjunctionChanged()">
          {{'_#(Not)'}}
        </label>
        <div class="condition-builder__toggle-group" role="radiogroup" aria-label="_#(Condition Logic)">
          <label class="condition-builder__toggle form-check-label">
            <input type="radio" name="vpm-andOrButtons-{{uniquePageId}}"
                   class="form-check-input"
                   [(ngModel)]="conjunction.conjunction"
                   [value]="ConjunctionTypes.AND"
                   [disabled]="conditionList.length == 0"
                   (ngModelChange)="conjunctionChanged()">
             {{'_#(And)'}}
          </label>
          <label class="condition-builder__toggle form-check-label">
            <input type="radio" name="vpm-andOrButtons-{{uniquePageId}}"
                   class="form-check-input"
                   [(ngModel)]="conjunction.conjunction"
                   [value]="ConjunctionTypes.OR"
                   [disabled]="conditionList.length == 0"
                   (ngModelChange)="conjunctionChanged()">
             {{'_#(Or)'}}
          </label>
        </div>
      </div>
    </div>
  </div>
  <div class="condition-builder__list-row">
    <div class="condition-builder__list" [ngClass]="getConditionListBoxClass()">
      <div *ngFor="let item of conditionList; let even = even; let i = index;"
           class="condition-builder__list-item unhighlightable"
           [class.condition-builder__list-item--selected]="selectedIndex == i"
           (click)="conditionItemSelected(i)">
        <div *ngIf="even">
          {{item | clauseToString}}
        </div>
        <div *ngIf="!even" class="condition-builder__junction-label">
          {{item | conjunctionToString}}
        </div>
      </div>
    </div>
    <div class="condition-builder__actions">
      <button type="button" class="btn btn-primary"
              (click)="insert()"
              [disabled]="!isConditionValid(condition)">
        {{buttonText}}
      </button>
      <button type="button" class="btn btn-secondary"
              (click)="modify()"
              [disabled]="modifyDisable()">
        _#(Modify)
      </button>
      <button type="button" class="btn btn-secondary" (click)="deleteCondition()"
              [disabled]="selectedIndex == null || selectedIndex % 2 !== 0">
        _#(Delete)
      </button>
      <button type="button" class="btn btn-secondary" (click)="clear()"
              [disabled]="conditionList == null || conditionList.length === 0">
        _#(Clear)
      </button>
      <button type="button" class="btn btn-secondary" (click)="indent()"
              [disabled]="!canIndent()">
        _#(Indent)
      </button>
      <button type="button" class="btn btn-secondary" (click)="unindent()"
              [disabled]="!canUnindent()">
        _#(Unindent)
      </button>
      <button type="button" class="btn btn-secondary" (click)="up()"
              [disabled]="!canMoveUp()">
        _#(Move Up)
      </button>
      <button type="button" class="btn btn-secondary" (click)="down()"
              [disabled]="!canMoveDown()">
        _#(Move Down)
      </button>
    </div>
  </div>
</div>

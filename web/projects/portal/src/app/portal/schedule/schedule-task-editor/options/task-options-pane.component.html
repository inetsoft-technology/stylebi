<form [formGroup]="form">
  <div class="task-options-pane">
    <div class="row shell-form-row--field task-options-pane__row">
      <div class="col">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" [(ngModel)]="_model.enabled" id="enabled"
            [ngModelOptions]="{standalone: true}">
          <label class="form-check-label" for="enabled">
            _#(Enabled)
          </label>
        </div>
      </div>
      <div class="col">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="deleteIf"
            [(ngModel)]="_model.deleteIfNotScheduledToRun"
            [ngModelOptions]="{standalone: true}">
          <label class="form-check-label" for="deleteIf">
            _#(schedule.task.options.isDelete)
          </label>
        </div>
      </div>
    </div>
    <div class="row shell-form-row--field task-options-pane__row">
      <div class="col">
        <div class="form-floating">
          <div class="input-group task-options-pane__date-group">
            <input class="form-control date-picker-input" readOnly placeholder="yyyy-mm-dd"
              name="startDate"
              ngbDatepicker #startDatePicker="ngbDatepicker" placement="bottom-start"
              container="body" [navigation]="'none'" [contentTemplate]="scheduleDatepickerContent"
              [formControl]="form.get('start')">
            <button class="input-group-btn-addon btn icon-hover-bg task-options-pane__icon-button"
              (click)="startDatePicker.toggle(); endDatePicker.close()" type="button">
              <span class="calendar-icon icon-size-medium align-middle"></span>
            </button>
            <button type="button" class="input-group-button btn btn-secondary task-options-pane__action-button"
              (click)="clearStartDate()">
              _#(Clear)
            </button>
          </div>
          <label>_#(Start From)</label>
        </div>
      </div>
    </div>
    <div class="row shell-form-row--field task-options-pane__row">
      <div class="col">
        <div class="form-floating">
          <div class="input-group task-options-pane__date-group">
            <input class="form-control date-picker-input" readOnly placeholder="yyyy-mm-dd"
              name="endDate"
              ngbDatepicker #endDatePicker="ngbDatepicker" placement="bottom-start"
              container="body" [navigation]="'none'" [contentTemplate]="scheduleDatepickerContent"
              [formControl]="form.get('stop')"
              [class.is-invalid]="!form.valid && form.dirty">
            <button class="input-group-btn-addon btn icon-hover-bg task-options-pane__icon-button"
              (click)="endDatePicker.toggle(); startDatePicker.close()" type="button">
              <span class="calendar-icon icon-size-medium align-middle"></span>
            </button>
            <button type="button" class="input-group-button btn btn-secondary task-options-pane__action-button"
              (click)="clearEndDate()">
              _#(Clear)
            </button>
          </div>
          <label>_#(Stop On)</label>
          @if (form.getError('dateGreaterThan')) {
            <span class="invalid-feedback">
              _#(stop.after.start.date)
            </span>
          }
        </div>
      </div>
    </div>

    <div class="row shell-form-row--field task-options-pane__row">
      <div class="col form-floating">
        <custom-select [options]="timeZoneSelectOptions" formControlName="timeZone"></custom-select>
        <label>_#(Time Zone)</label>
      </div>
    </div>
    <div class="row shell-form-row--field task-options-pane__row">
      <div class="col form-floating">
        <div class="input-group btn-group task-options-pane__execute-as-group">
          <custom-select class="w-auto"
                           [options]="executeAsTypeSelectOptions"
                           [disabled]="disableExecuteAs()"
                           [(ngModel)]="executeAsType"
                           [ngModelOptions]="{standalone: true}">
            </custom-select>
          <input type="text" class="form-control w-75" id="inputAddress2" [ngModelOptions]="{standalone: true}"
            [ngModel]="executeAsName" [disabled]="disableExecuteAs()" (ngModelChange)="updateExecuteAs($event)">
          <div class="execute-as-buttons">
            @if (loadingUsers) {
              <div class="loading-icon-container">
                <i class="loading-icon--spin icon-size-large loading-icon" aria-hidden="true"></i>
              </div>
            }
          </div>
          <button type="button" class="input-group-button btn btn-secondary task-options-pane__action-button"
          (click)="clearUser()" [disabled]="disableExecuteAs()">_#(Clear)</button>
          <button type="button" class="input-group-button btn btn-secondary task-options-pane__action-button"
          [disabled]="disableExecuteAs()" (click)="openExecuteAsDialog()">_#(Select)</button>
        </div>
        <label>_#(Execute As)</label>
      </div>
    </div>
    <div class="row shell-form-row--field task-options-pane__row">
      <div class="col form-floating">
        <custom-select [options]="localeSelectOptions"
                         [(ngModel)]="locale"
                         [ngModelOptions]="{standalone: true}">
          </custom-select>
        <label>_#(Locale)</label>
      </div>
    </div>
    <div class="row shell-form-row--field task-options-pane__row" [style.display]="_model.securityEnabled ? null : 'none'">
      <div class="col form-floating">
        <input class="form-control" [ngModel]="_model.ownerAlias ? _model.ownerAlias : _model.owner"
          [disabled]="true" [ngModelOptions]="{standalone: true}">
        <label>_#(Owner)</label>
      </div>
    </div>
    <div class="row shell-form-row--field task-options-pane__row">
      <div class="col form-floating">
        <input type="text" class="form-control" [(ngModel)]="_model.description"
          [ngModelOptions]="{standalone: true}">
        <label>_#(Description)</label>
      </div>
    </div>
    <div class="shell-form-group task-options-pane__footer">
      <button type="button" class="btn btn-primary" (click)="save()"
        [disabled]="!form.valid || !parentForm.valid">
        _#(Save)
      </button>
      <button type="button" class="btn btn-secondary" (click)="closeEditor.emit(_model)">
        _#(Close)
      </button>
      @if (newTask) {
        <button type="button" class="btn btn-secondary" (click)="cancelTask.emit()">
          _#(Cancel)
        </button>
      }
    </div>
  </div>
</form>
<ng-template #scheduleDatepickerContent let-datepicker>
  <div class="schedule-datepicker__calendar">
    <div class="ngb-dp-header schedule-datepicker__calendar-header">
      <div class="schedule-datepicker__calendar-nav">
        <button type="button"
                class="btn btn-light-no-bg schedule-datepicker__nav-button schedule-datepicker__nav-button--prev"
                [disabled]="!canNavigateMonth(datepicker, -1)"
                (click)="navigateMonth(datepicker, -1)"
                aria-label="_#(Previous month)">
          <i class="chevron-left-icon icon-size0" aria-hidden="true"></i>
        </button>
        <custom-select class="schedule-datepicker__nav-select schedule-datepicker__nav-select--month"
                       [options]="getMonthSelectOptions(datepicker)"
                       [ngModel]="datepicker.state.firstDate.month"
                       [ngModelOptions]="{standalone: true}"
                       ariaLabel="_#(Select month)"
                       (selectionChange)="selectMonth(datepicker, $event)">
        </custom-select>
        <custom-select class="schedule-datepicker__nav-select schedule-datepicker__nav-select--year"
                       [options]="getYearSelectOptions(datepicker)"
                       [ngModel]="datepicker.state.firstDate.year"
                       [ngModelOptions]="{standalone: true}"
                       ariaLabel="_#(Select year)"
                       (selectionChange)="selectYear(datepicker, $event)">
        </custom-select>
        <button type="button"
                class="btn btn-light-no-bg schedule-datepicker__nav-button"
                [disabled]="!canNavigateMonth(datepicker, 1)"
                (click)="navigateMonth(datepicker, 1)"
                aria-label="_#(Next month)">
          <i class="chevron-right-icon icon-size0" aria-hidden="true"></i>
        </button>
      </div>
    </div>
    <div class="ngb-dp-content ngb-dp-months">
      @for (month of datepicker.state.months; track month) {
        <div class="ngb-dp-month">
          @if (datepicker.displayMonths > 1) {
            <div class="ngb-dp-month-name">
              {{ datepicker.i18n.getMonthLabel(month) }}
            </div>
          }
          <ngb-datepicker-month [month]="month"></ngb-datepicker-month>
        </div>
      }
    </div>
  </div>
</ng-template>

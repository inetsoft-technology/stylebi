<modal-header [title]="'_#(Resize Cell)'" (onCancel)="cancel()" [cshid]="'ResizeCell'">
</modal-header>

<div class="modal-body"
     [enterSubmit]="true"
     (onEnter)="ok()">
  @if (form) {
    <form [formGroup]="form" class="container-fluid">
      <div class="shell-form-row--field row">
        <div class="col d-flex flex-column">
          <label class="form-label">_#(Cell Width)</label>
          <number-stepper formControlName="cellWidth" [min]="0"
                          [invalid]="!!cellWidth.errors">
          </number-stepper>
          @if (cellWidth.errors) {
            <div class="shell-alert shell-alert--danger">
              _#(composer.vs.table.cellSize.error)
            </div>
          }
        </div>
      </div>
      <div class="shell-form-row--field row">
        <div class="col d-flex flex-column">
          <label class="form-label">_#(Cell Height)</label>
          <number-stepper formControlName="cellHeight" [min]="0"
                          [invalid]="!!cellHeight.errors">
          </number-stepper>
          @if (cellHeight.errors) {
            <div class="shell-alert shell-alert--danger">
              _#(composer.vs.table.cellSize.error)
            </div>
          }
        </div>
      </div>
    </form>
  }
</div>

<div class="modal-footer">
  <button type="submit" class="btn btn-primary" (click)="ok()" [disabled]="!form.valid">_#(OK)</button>
  <button type="button" class="btn btn-default" data-dismiss="modal" (click)="cancel()">_#(Cancel)</button>
</div>

<form [formGroup]="form" class="container-fluid">
  <fieldset>
    <legend>_#(Padding)</legend>
    <div class="row form-row-float-label">
      <div class="col">
        <div class="form-floating">
          <number-stepper formControlName="top" [min]="0"
                          (valueChange)="model.top = $event"
                          [invalid]="form.controls['top'].invalid">
          </number-stepper>
          <label>_#(Top)</label>
        </div>
      </div>
      <div class="col">
        <div class="form-floating">
          <number-stepper formControlName="left" [min]="0"
                          (valueChange)="model.left = $event"
                          [invalid]="form.controls['left'].invalid">
          </number-stepper>
          <label>_#(Left)</label>
        </div>
      </div>
      <div class="col">
        <div class="form-floating">
          <number-stepper formControlName="bottom" [min]="0"
                          (valueChange)="model.bottom = $event"
                          [invalid]="form.controls['bottom'].invalid">
          </number-stepper>
          <label>_#(Bottom)</label>
        </div>
      </div>
      <div class="col">
        <div class="form-floating">
          <number-stepper formControlName="right" [min]="0"
                          (valueChange)="model.right = $event"
                          [invalid]="form.controls['right'].invalid">
          </number-stepper>
          <label>_#(Right)</label>
        </div>
      </div>
    </div>
  </fieldset>
  <div class="alert alert-danger" *ngIf="form.controls['top'].errors || form.controls['left'].errors || form.controls['bottom'].errors || form.controls['right'].errors">
    _#(viewer.viewsheet.layout.paddingValid)
  </div>
</form>

<form [formGroup]="form" class="container-fluid">
  <fieldset>
    <legend>_#(Layout)</legend>
    <div class="row shell-form-row--field">
      <div class="col">
        <div class="d-flex flex-column">
          <label class="form-label">_#(Top)</label>
          <number-stepper formControlName="top"
                          (valueChange)="model.top = $event"
                          [disabled]="!layoutEnabled || model.locked"
                          [invalid]="layoutEnabled && !!form.controls['top'].errors">
          </number-stepper>
        </div>
      </div>
      <div class="col layout-col-offset">
        <div class="d-flex flex-column">
          <label class="form-label">_#(Left)</label>
          <number-stepper formControlName="left"
                          (valueChange)="model.left = $event"
                          [disabled]="!layoutEnabled || model.locked"
                          [invalid]="layoutEnabled && !!form.controls['left'].errors">
          </number-stepper>
        </div>
      </div>
      <div class="col layout-col-offset">
        <div class="d-flex flex-column" *ngIf="!isGroup && !isViewsheet">
          <label class="form-label">_#(Width)</label>
          <number-stepper formControlName="width"
                          (valueChange)="model.width = $event"
                          [disabled]="!layoutEnabled || model.locked"
                          [invalid]="layoutEnabled && !!form.controls['width'].errors">
          </number-stepper>
        </div>
      </div>
      <div class="col layout-col-offset">
        <div class="d-flex flex-column" *ngIf="!isGroup && !isViewsheet">
          <label class="form-label">_#(Height)</label>
          <number-stepper formControlName="height"
                          (valueChange)="model.height = $event"
                          [disabled]="!layoutEnabled || model.locked"
                          [invalid]="layoutEnabled && !!form.controls['height'].errors">
          </number-stepper>
        </div>
      </div>
      <div class="col layout-col-offset" *ngIf="showTitleHeight">
        <div class="d-flex flex-column">
          <label class="form-label">_#(Title Height)</label>
          <number-stepper formControlName="titleHeight"
                          (valueChange)="model.titleHeight = $event"
                          [invalid]="!!form.controls['titleHeight'].errors">
          </number-stepper>
        </div>
      </div>
      <div class="col layout-col-offset" *ngIf="showCellHeight">
        <div class="d-flex flex-column">
          <label class="form-label">_#(Cell Height)</label>
          <number-stepper formControlName="cellHeight"
                          (valueChange)="model.cellHeight = $event"
                          [invalid]="!!form.controls['cellHeight'].errors">
          </number-stepper>
        </div>
      </div>
    </div>
    <div class="row shell-form-row--field" *ngIf="showScaleVertical">
      <div class="col-auto">
        <div class="checkbox">
          <div class="form-check">
            <input id="scaleV" type="checkbox" class="form-check-input" id="scaleV"
                   formControlName="scaleVertical"
                   [(ngModel)]="model.scaleVertical" [disabled]="!layoutEnabled || model.locked"/>
            <label class="form-check-label" for="scaleV">
              _#(Scale vertically when scaling to screen)
            </label>
          </div>
        </div>
      </div>
    </div>
  </fieldset>
  <div class="shell-alert shell-alert--danger" *ngIf="layoutEnabled && form.controls['top'].errors">
    _#(viewer.viewsheet.layout.topValid)
  </div>
  <div class="shell-alert shell-alert--danger" *ngIf="layoutEnabled && form.controls['left'].errors">
    _#(viewer.viewsheet.layout.leftValid)
  </div>
  <div class="shell-alert shell-alert--danger" *ngIf="layoutEnabled && form.controls['width'].errors">
    _#(viewer.viewsheet.layout.widthValid)
  </div>
  <div class="shell-alert shell-alert--danger" *ngIf="layoutEnabled && form.controls['height'].errors">
    _#(viewer.viewsheet.layout.heightValid)
  </div>
  <div class="shell-alert shell-alert--danger" *ngIf="showTitleHeight && form.controls['titleHeight'].errors">
    _#(viewer.viewsheet.layout.titleHeightValid)
  </div>
  <div class="shell-alert shell-alert--danger" *ngIf="showCellHeight && form.controls['cellHeight'].errors">
    _#(viewer.viewsheet.layout.cellHeightValid0)
  </div>
</form>

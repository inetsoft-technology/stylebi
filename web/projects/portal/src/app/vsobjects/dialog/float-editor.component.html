<form [formGroup]="form" class="container-fluid">
  <div class="row form-row-float-label">
    <div class="col form-floating">
      <number-stepper formControlName="min"
                      (valueChange)="model.minimum = $event"
                      [inputmode]="'decimal'">
      </number-stepper>
      <label>_#(Minimum)</label>
    </div>
  </div>
  <div class="row form-row-float-label">
    <div class="col form-floating">
      <number-stepper formControlName="max"
                      (valueChange)="model.maximum = $event"
                      [inputmode]="'decimal'">
      </number-stepper>
      <label>_#(Maximum)</label>
    </div>
  </div>
  <div class="row form-row-float-label">
    <div class="col form-floating">
      <textarea class="form-control" [(ngModel)]="model.errorMessage"
      [ngModelOptions]="{standalone: true}" placeholder="_#(Error Message)"></textarea>
      <label>_#(Error Message)</label>
    </div>
  </div>
  @if (form.hasError('greaterThan')) {
    <div class="shell-alert shell-alert--danger">
      _#(viewer.formEditor.minMaxValid)
    </div>
  }
</form>

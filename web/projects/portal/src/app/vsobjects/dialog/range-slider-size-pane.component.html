<form class="container-fluid" [formGroup]="form">
  <fieldset>
    <legend>_#(Options)</legend>
    <div class="row shell-form-row--field">
      <div class="col-auto pe-0 d-flex flex-column" [ngClass]="{ 'has-error' : !form.controls['length'].valid}">
          <label class="form-label">_#(Slider Size)</label>
          <number-stepper formControlName="length" [min]="1"
                          (valueChange)="model.length = $event"
                          [invalid]="!form.controls['length'].valid">
          </number-stepper>
      </div>
      <div class="col-auto ps-1 align-self-end" *ngIf="!dataModel.composite && rangeOptions.length > 1">
        <custom-select [options]="rangeSelectOptions"
                       [ngModelOptions]="{standalone: true}"
                       [(ngModel)]="model.rangeType"
                       ariaLabel="_#(Range Type)">
        </custom-select>
      </div>
      <div class="col-auto align-self-end" *ngIf="dataModel.composite">_#(periods)</div>
    </div>
    <div *ngIf="form.controls['length'].errors" class="shell-alert shell-alert--danger">
      _#(viewer.viewsheet.timeSlider.sliderSizeWarning)
    </div>
    <div class="row shell-form-row--field">
      <div class="col d-flex flex-column" [ngClass]="{ 'has-error' : !form.controls['rangeSize'].valid}">
          <label class="form-label">_#(Minimum Increment)</label>
          <number-stepper formControlName="rangeSize" [min]="0"
                          (valueChange)="model.rangeSize = $event"
                          [invalid]="!form.controls['rangeSize'].valid">
          </number-stepper>
      </div>
      <div class="col d-flex flex-column" [ngClass]="{ 'has-error' : !form.controls['maxRangeSize'].valid}">
          <label class="form-label">_#(Maximum Increment)</label>
          <number-stepper formControlName="maxRangeSize" [min]="0"
                          (valueChange)="model.maxRangeSize = $event"
                          [invalid]="!form.controls['maxRangeSize'].valid">
          </number-stepper>
      </div>
    </div>
    <div *ngIf="form.controls['rangeSize'].errors" class="shell-alert shell-alert--danger">
      _#(viewer.worksheet.Grouping.positiveNumber)
    </div>
    <div *ngIf="form.controls['maxRangeSize'].errors" class="shell-alert shell-alert--danger">
      _#(viewer.worksheet.Grouping.positiveNumber)
    </div>
    <div class="row shell-form-row--field">
      <div class="col-auto">
        <div class="form-check">
          <input type="checkbox" class="form-check-input logScale-cb_id" id="log"
               [disabled]="logScaleDisabled || dataModel.composite"
               [ngModelOptions]="{standalone: true}" [(ngModel)]="model.logScale"
               (change)="updateRangeSizeDisabled(); updateMaxRangeSizeDisabled()">
          <label class="form-check-label" for="log">
            _#(Logarithmic Scale)
          </label>
        </div>
      </div>
      <div class="col-auto">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="upper"
               [ngModelOptions]="{standalone: true}"
               [(ngModel)]="model.upperInclusive"/>
          <label class="form-check-label" for="upper">
            _#(Upper Bound Inclusive)
          </label>
        </div>
      </div>
      <div class="col-auto">
        <div class="form-check">
          <input id="submitBox" type="checkbox" class="form-check-input"
                 [ngModelOptions]="{standalone: true}" [(ngModel)]="model.submitOnChange"/>
          <label class="form-check-label" for="submitBox">
            _#(Submit on Change)
          </label>
        </div>
      </div>
    </div>
  </fieldset>
</form>

<form ngNoForm (submit)="$event.preventDefault()">
  <div class="shell-form-row">
    <div class="col">
      <div class="bordered-box selection-list-editor__surface">
        @for (localizedTables of model.localizedTables; track localizedTables; let i = $index) {
          <div [class.selected]="localTable == model.tables[i]" (click)="selectTable(i)"
            >
            <div [title]="getToolTip(i)">{{localizedTables}}</div>
          </div>
        }
      </div>
    </div>
    <div class="col">
      <div class="shell-form-row--field">
        <div class="form-floating">
          <custom-select [(ngModel)]="localColumn"
                         [options]="columnOptions"
                         id="label">
          </custom-select>
          <label>_#(Label)</label>
        </div>
      </div>
      <div class="shell-form-row--field">
        <div class="form-floating">
          <custom-select [(ngModel)]="localValue"
                         [options]="columnOptions"
                         id="value">
          </custom-select>
          <label>_#(Value)</label>
        </div>
      </div>
      <div>
        @if (showApplySelection) {
          <div class="form-check">
            <input type="checkbox" class="form-check-input" [(ngModel)]="localForm" id="apply">
            <label class="form-check-label" for="apply">
              _#(Apply Selection)
            </label>
          </div>
        }
      </div>
    </div>
  </div>
</form>

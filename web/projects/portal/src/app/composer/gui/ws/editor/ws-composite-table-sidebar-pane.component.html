<split-pane class="unhighlightable" direction="vertical" [sizes]="[75, 25]"
  [minSize]="100" [snapOffset]="0">
  <div class="composite-table-sidebar-container pt-2 ps-2">
    <div class="d-flex flex-column">
      <div class="unrelated-table-list-container">
        @if (compatibleTables?.length > 0) {
          <div>
            @for (_table of compatibleTables; track _table.name) {
              <div class="text-overflow" draggable="true"
                (dragstart)="dragCompatibleTable($event, _table.name)">
                <ws-assembly-thumbnail-title [assembly]="_table"></ws-assembly-thumbnail-title>
              </div>
            }
          </div>
        }
        @if (compatibleTables && compatibleTables.length === 0) {
          <div>_#(viewer.worksheet.sidebar.compatible)</div>
        }
        @if (!compatibleTables) {
          <span>Determining compatible tables...&nbsp;&nbsp;<span class="compatible-tables-loading-icon"></span></span>
        }
      </div>
    </div>
  </div>
  @if (!isMergeJoinTable()) {
    <subtable-list [compositeTable]="compositeTable" [worksheet]="worksheet"></subtable-list>
  }
</split-pane>

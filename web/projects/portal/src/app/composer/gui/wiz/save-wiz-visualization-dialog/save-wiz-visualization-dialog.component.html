<modal-header [title]="'_#(Save Visualization)'" (onCancel)="cancelChanges()" [cshid]="'SavingaVisualization'">
</modal-header>

<!-- Page 1: Save type selection -->
<ng-container *ngIf="showTypePage">
  <div class="modal-body">
    <div class="save-type-container">

      <!-- Radio mode (standaloneVisualization=true): Publish As Dashboard / Shared Component -->
      <ng-container *ngIf="standaloneVisualization">
        <p class="save-type-label">_#(Select how to save this visualization:)</p>
        <div class="form-check save-type-option">
          <input class="form-check-input" type="radio" id="publishAsDashboard"
                 name="visualizationScope" value="public"
                 [(ngModel)]="model.visualizationScope">
          <label class="form-check-label" for="publishAsDashboard">
            _#(Publish As Dashboard)
          </label>
        </div>
        <div class="form-check save-type-option">
          <input class="form-check-input" type="radio" id="sharedComponent"
                 name="visualizationScope" value="shared"
                 [(ngModel)]="model.visualizationScope">
          <label class="form-check-label" for="sharedComponent">
            _#(Shared Component)
          </label>
        </div>
      </ng-container>

      <!-- Checkbox mode (standaloneVisualization=false): single Shared Component checkbox -->
      <ng-container *ngIf="!standaloneVisualization">
        <div class="form-check save-type-option">
          <input class="form-check-input" type="checkbox" id="sharedComponentCheck"
                 [ngModel]="model.visualizationScope === 'shared'"
                 (ngModelChange)="model.visualizationScope = $event ? 'shared' : 'private'">
          <label class="form-check-label" for="sharedComponentCheck">
            _#(Shared Component)
          </label>
        </div>
      </ng-container>

    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="next()" [disabled]="!canNext">
      _#(Next)
    </button>
    <button *ngIf="!standaloneVisualization" type="button" class="btn btn-primary"
            [disabled]="model.visualizationScope === 'shared'" (click)="okDirect()">
      _#(OK)
    </button>
    <button type="button" class="btn btn-default" data-dismiss="modal" (click)="cancelChanges()">
      _#(Cancel)
    </button>
  </div>
</ng-container>

<!-- Page 2: Name + tree selection -->
<ng-container *ngIf="!showTypePage">
  <div class="modal-body" [enterSubmit]="formValid" (onEnter)="enter()" *ngIf="model && form">
    <form [formGroup]="form" class="form-horizontal">
      <fieldset>
      <div class="form-row-float-label">
        <div class="col">
          <div class="form-floating">
            <input class="form-control" type="text" id="name" trim formControlName="name"
                 [class.is-invalid]="!form.controls['name'].valid"
                 [(ngModel)]="model.name" defaultFocus [autoSelect]="false">
            <label><span>_#(Name)</span></label>

          <span *ngIf="form.controls['name'].errors && form.controls['name'].errors['required']"
                class="invalid-feedback">
            _#(viewer.nameValid)
          </span>
          <span *ngIf="form.controls['name'].errors && !form.controls['name'].errors['assetNameStartWithCharDigit'] &&
                       form.controls['name'].errors['assetEntryBannedCharacters']"
                class="invalid-feedback">
            _#(composer.sheet.checkSpeChar)
          </span>
          <span *ngIf="form.controls['name'].errors && form.controls['name'].errors['assetNameStartWithCharDigit']"
                class="invalid-feedback">
            _#(asset.tree.checkStart)
          </span>
          </div>
        </div>
      </div>
      </fieldset>
    </form>
    <fieldset>
       <legend>_#(Scope)</legend>
    </fieldset>
    <asset-tree #assetTree [datasources]="false" [worksheets]="false" [viewsheets]="true"
                [publish]="model.visualizationScope === 'public'"
                [shared]="model.visualizationScope === 'shared'"
                [defaultFolder]="defaultFolder"
                [selectNodeOnLoadFn]="selectNodeOnLoadFn"
                (nodeSelected)="selectFolder($event)" class="rep-tree">
    </asset-tree>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-default" (click)="back()">
      _#(Back)
    </button>
    <button type="button" class="btn btn-primary" (click)="ok()" [disabled]="!model || !form?.valid" #okButton>
      _#(OK)
    </button>
    <button type="button" class="btn btn-default" data-dismiss="modal" (click)="cancelChanges()">
      _#(Cancel)
    </button>
  </div>
</ng-container>

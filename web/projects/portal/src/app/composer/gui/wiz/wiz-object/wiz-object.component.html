<div class="wiz-object-container"
     [style.left.px]="vsObject.objectFormat.left"
     [style.top.px]="vsObject.objectFormat.top"
     [style.z-index]="vsObject.objectFormat.zIndex">
  <div class="wiz-object-border"
       [style.width.px]="vsObject.objectFormat.width"
       [style.height.px]="vsObject.objectFormat.height">
    <vs-calendar *ngIf="vsObject.objectType == 'VSCalendar'"
                 [vsInfo]="viewsheet" [model]="vsObject"></vs-calendar>
    <vs-chart *ngIf="vsObject.objectType == 'VSChart'"
              [vsInfo]="viewsheet" [model]="vsObject" [container]="container"></vs-chart>
    <vs-crosstab *ngIf="vsObject.objectType == 'VSCrosstab'"
                 [vsInfo]="viewsheet" [model]="vsObject"></vs-crosstab>
    <vs-gauge *ngIf="vsObject.objectType == 'VSGauge'"
              [vsInfo]="viewsheet" [model]="vsObject"></vs-gauge>
    <vs-image *ngIf="vsObject.objectType == 'VSImage'"
              [vsInfo]="viewsheet" [model]="vsObject"></vs-image>
    <vs-range-slider *ngIf="vsObject.objectType == 'VSRangeSlider'"
                     [vsInfo]="viewsheet" [model]="vsObject"
                     [viewsheetScale]="viewsheet.scale"></vs-range-slider>
    <vs-selection *ngIf="vsObject.objectType == 'VSSelectionList'"
                  [vsInfo]="viewsheet" [model]="vsObject"></vs-selection>
    <vs-selection *ngIf="vsObject.objectType == 'VSSelectionTree'"
                  [vsInfo]="viewsheet" [model]="vsObject"></vs-selection>
    <vs-table *ngIf="vsObject.objectType == 'VSTable'"
              [vsInfo]="viewsheet" [model]="vsObject"></vs-table>
    <vs-text *ngIf="vsObject.objectType == 'VSText'"
             [vsInfo]="viewsheet" [model]="vsObject"></vs-text>
  </div>
</div>

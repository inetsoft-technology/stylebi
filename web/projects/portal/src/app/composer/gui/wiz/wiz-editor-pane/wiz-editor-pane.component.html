<div class="wiz-editor-pane-container">
  <div class="composer-header editor-tool-bar">
    <div class="title-bar btn-toolbar composer-btn-toolbar" role="toolbar">
      <div class="title">
        <i class="composer-icon editor-breadcrumb txt-primary"></i>
        <i class="chat-icon editor-breadcrumb-1 me-2"></i>
        <h4>{{currentVisualization?.label}}</h4>
      </div>
      <toolbar-group class="btn-toolbar-pull-right" [showTooltips]="true"
                     [actionGroup]="actionGroup" [asMenu]="false">
      </toolbar-group>
    </div>
  </div>
  <div class="wiz-editor-pane-content">
    <wiz-visualization-pane [currentVisualization]="currentVisualization">
    </wiz-visualization-pane>
  </div>
</div>

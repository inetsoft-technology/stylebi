<split-pane *ngIf="!initError" direction="horizontal" [sizes]="[60, 40]" [minSize]="200"
            [snapOffset]="0" [gutterSize]="4">
  <!-- Left: Viewsheet object preview -->
  <div class="wiz-preview-panel split bordered-box">
    <wiz-vs-preview [viewsheet]="currentVisualization"
                    [bindingDetails]="wizBindingDetails"
                    [worksheetDetails]="wizWorksheetDetails"
                    (canvasResize)="onCanvasResize()">
    </wiz-vs-preview>
    <vs-loading-display *ngIf="viewsheetLoading"
                        [autoShowCancel]="false"
                        [runtimeId]="currentVisualization?.runtimeId">
    </vs-loading-display>
  </div>

  <!-- Right: AI dialog placeholder (web component will be embedded here) -->
  <div class="wiz-dialog-panel split">
    <wiz-chat *ngIf="!!currentVisualization?.runtimeId || currentVisualization?.standaloneVisualization" class="wiz-chat-pane"
              [attr.stylebi-url]="wizPortalService.styleBIUrl"
              [attr.visualization-runtime-id]="currentVisualization?.runtimeId"
              [attr.chat-session-id]="currentVisualization?.chatSessionId"
              [attr.wiz-service-url]="wizPortalService.wizServiceUrl"
              [attr.expected-user-id]="wizPortalService.userId || null"
              [attr.domain]="wizPortalService.domain || null"
              (refreshViewsheet)="refreshVisualization()">
    </wiz-chat>
  </div>
</split-pane>

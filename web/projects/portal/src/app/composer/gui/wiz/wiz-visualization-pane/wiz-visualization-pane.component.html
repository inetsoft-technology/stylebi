<split-pane direction="horizontal" [sizes]="[50, 50]" [minSize]="200"
           [snapOffset]="0" [gutterSize]="4">
  <!-- Left: AI dialog placeholder (web component will be embedded here) -->
  <div class="wiz-dialog-panel split">
    <div class="wiz-action-bar">
      <button class="btn btn-secondary btn-sm" (click)="exit()">Exit</button>
      <button class="btn btn-primary btn-sm" (click)="accept()">Accept</button>
    </div>
    <div class="wiz-dialog-placeholder">
      <span class="placeholder-label">_#(js:Ai Chat)</span>
    </div>
  </div>

  <!-- Right: Viewsheet object preview -->
  <div class="wiz-preview-panel split bordered-box">
    <wiz-vs-preview [viewsheet]="currentVisualization"></wiz-vs-preview>
  </div>
</split-pane>

<div *ngIf="initError" class="wiz-init-error">
  <span class="wiz-init-error-message">{{initError}}</span>
  <button type="button" class="btn btn-default" (click)="exit()">_#(Exit)</button>
</div>
<split-pane *ngIf="!initError" direction="horizontal" [sizes]="[50, 50]" [minSize]="200"
           [snapOffset]="0" [gutterSize]="4">
  <!-- Left: AI dialog placeholder (web component will be embedded here) -->
  <div class="wiz-dialog-panel split">
    <wiz-chat *ngIf="!!currentVisualization?.runtimeId" class="wiz-chat-pane"
              [attr.stylebi-url]="wizPortalService.styleBIUrl"
              [attr.visualization-runtime-id]="currentVisualization?.runtimeId"
              [attr.chat-session-id]="currentVisualization?.chatSessionId"
              [attr.wiz-service-url]="wizPortalService.wizServiceUrl"
              [attr.expected-user-id]="wizPortalService.userId || null"
              [attr.domain]="wizPortalService.domain || null"
              (refreshViewsheet)="refreshVisualization()">
    </wiz-chat>
  </div>

  <!-- Right: Viewsheet object preview -->
  <div class="wiz-preview-panel split bordered-box">
    <div class="wiz-action-bar">
      <button type="button" class="btn btn-default" (click)="exit()">_#(Exit)</button>
      <button type="button" class="btn btn-primary" (click)="accept()">_#(Accept)</button>
    </div>
    <wiz-vs-preview [viewsheet]="currentVisualization"></wiz-vs-preview>
  </div>
</split-pane>

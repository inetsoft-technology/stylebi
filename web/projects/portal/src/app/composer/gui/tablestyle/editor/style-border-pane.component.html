<div>
  <button class="form-control dropdown-toggle style-select-height"
    [fixedDropdown]="dropdownMenu" [style.white-space]="'nowrap'" data-test="border-style-dropdown">
    @if (!cssClass) {
      <span class="line-label">{{styleLabel}}</span>
    }
    @if (cssClass) {
      <div [class]="'line-display ' + cssClass"></div>
    }
  </button>
</div>
<ng-template #dropdownMenu>
  <ul role="menu" class="dropdown-pane">
    @for (style of styles; track $index) {
      <li class="line-style-menu hover-bg-primary-selectable"
        [class.selected]="style.value == borderStyle"
        [class.fade]="style.value == '1'"
        (click)="setBorderStyle(style.value, style.cssClass)">
        @if (style.label) {
          <label class="line-label">{{style.label}}</label>
        }
        @if (style.cssClass) {
          <div [class]="'line-display ' + style.cssClass"></div>
        }
      </li>
    }
  </ul>
</ng-template>

<form ngNoForm (submit)="$event.preventDefault()" class="container-fluid">
  <fieldset>
    <legend>_#(Label)</legend>
    <div class="form-row-float-label row">
      <div class="checkbox col-auto">
        <div class="form-check">
          <input type="checkbox" class="form-check-input"
                 [(ngModel)]="model.showLabel" id="showLabel"
                 (ngModelChange)="onShowLabelChange()">
          <label class="form-check-label" for="showLabel">
            _#(Show Label)
          </label>
        </div>
      </div>
    </div>
    <div class="form-row-float-label row" *ngIf="model.showLabel">
      <div class="col form-floating">
        <dynamic-combo-box [editable]="true"
                           [variables]="variableValues"
                           [(value)]="model.labelText"
                           [vsId]="vsId"
                           (typeChange)="selectTextType($event)">
        </dynamic-combo-box>
        <label><span>_#(Label Text)</span></label>
      </div>
    </div>
    <div class="form-row-float-label row input-label-pane__control-row" *ngIf="model.showLabel">
      <div class="col-6 form-floating mb-2">
        <custom-select [options]="positionOptions"
                       [(ngModel)]="model.labelPosition"
                       id="labelPosition">
        </custom-select>
        <label for="labelPosition"><span>_#(Label Position)</span></label>
      </div>
      <div class="col-6 mb-2 d-flex flex-column input-label-pane__gap-col">
        <label class="form-label input-label-pane__gap-label">_#(Gap px)</label>
        <number-stepper [(ngModel)]="model.labelGap" #gap="ngModel"
                        [min]="0" [max]="1000" (valueChange)="onGapChange()"
                        [invalid]="gap.invalid && gap.touched">
        </number-stepper>
      </div>
        <div class="col">
          <div class="alert alert-danger" *ngIf="gap.invalid && gap.touched">
            _#(Gap must be a number between 0 and 1000)
          </div>
        </div>
    </div>
  </fieldset>
</form>

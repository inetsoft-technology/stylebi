<modal-header [title]="'_#(Unpivot Data)'"
  [cshid]="'UnpivotingTable'"
  (onCancel)="close()">
</modal-header>
@if (form) {
  <div [enterSubmit]="formValid" (onEnter)="ok()" class="modal-body">
    <form [formGroup]="form" class="form-horizontal">
      <div class="shell-form-row--field row">
        <div class="col d-flex flex-column" [ngClass]="{ 'has-error' : !form.controls['level'].valid}">
          <number-stepper formControlName="level" [min]="1"
                        [invalid]="!form.controls['level'].valid">
        </number-stepper>
          <label><span>_#(common.worksheet.unpivot)</span></label>
        </div>
      </div>
      @if (form.controls['level'].errors && form.controls['level'].errors['positiveIntegerInRange']) {
        <div class="shell-alert shell-alert--danger">_#(common.worksheet.unpivot.valueCheck)</div>
      }
      @if (form.controls['level'].errors && form.controls['level'].errors['required']) {
        <div class="shell-alert shell-alert--danger">_#(Level is required)</div>
      }
    </form>
  </div>
}

<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="ok()" [disabled]="!form?.valid" #okButton>_#(OK)</button>
  <button type="button" class="btn btn-default" data-dismiss="modal" (click)="close()">_#(Cancel)</button>
</div>

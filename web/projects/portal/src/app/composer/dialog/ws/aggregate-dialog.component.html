<modal-header [title]="'_#(Group and Aggregate)'"
  (onCancel)="cancel()"
  [cshid]="'Grouping'">
</modal-header>

@if (model) {
  <div class="modal-body container-fluid" [enterSubmit]="formValid" (onEnter)="ok()">
    @if (!model.info.crosstab) {
      <aggregate-pane
        [model]="model" [trapFields]="trapFields"
      (validChange)="validChange($event)"></aggregate-pane>
    }
    @if (model.info.crosstab) {
      <crosstab-pane
        [model]="model" [trapFields]="trapFields"
      (validChange)="validChange($event)"></crosstab-pane>
    }
  </div>
}

<div class="modal-footer">
  <div class="row w-100">
    <div class="col">
      @if (model) {
        <button type="button" class="btn btn-default" (click)="toggle()">{{toggleContent}}</button>
      }
    </div>
    <div class="col col-auto">
      <button type="button" class="btn btn-default"
      (click)="clear()" [disabled]="clearDisabled()">_#(Clear)</button>
      @if (model) {
        <button type="button" class="btn btn-primary ms-2"
        (click)="ok()" [disabled]="!valid" #okButton>_#(OK)</button>
      }
      <button type="button" class="btn btn-default ms-2" data-dismiss="modal"
      (click)="cancel()">_#(Cancel)</button>
    </div>
  </div>
</div>

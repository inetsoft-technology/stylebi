@if (!!type) {
  @let imageInfo = getImageInfo();
  <div class="object-icon-container"
    [attr.title]="imageInfo?.tooltip">
    <img class="object-icon"
      [src]="imageInfo?.src"
      (click)="onSelected.emit()"/>
    <div class="additional-icon" (click)="onSelected.emit()">
      @if (isFacet()) {
        <i class="grid-icon"></i>
      }
      @if (isDualAxis()) {
        <i class="double-axis-icon"></i>
      }
    </div>
  </div>
}

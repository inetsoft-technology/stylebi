<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title data-th-text="#{InetSoft}">InetSoft</title>
  <base href="/sree/app/" data-th-href="${linkUri + 'app/'}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" data-th-attr="content=${openGraphTitle}" content="Business Intelligence Software | Dashboard Reporting">
  <meta property="og:description" data-th-attr="content=${openGraphDescription}" content="InetSoft is a pioneer in the field of data intelligence, providing big data analytics and dashboard reporting solutions. Get data right with InetSoft.">
  <meta property="og:site_name" data-th-attr="content=${openGraphSiteName}" content="InetSoft.com">
  <meta property="og:url" data-th-attr="content=${openGraphUrl}" content="http://localhost:8080/sree/app/portal">
  <meta property="og:image" data-th-attr="content=${openGraphImage}" content="http://localhost:8080/sree/images/logo.png">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <link rel="icon" type="image/x-icon" href="/sree/portal/favicon" data-th-href="${linkUri + 'portal/favicon'}">
  <link rel="stylesheet" type="text/css" href="global.css">
  <link th:if="${customTheme} == true" rel="stylesheet" type="text/css" href="theme-variables.css">
  <link th:if="${not #strings.isEmpty(customCss)}" rel="stylesheet" type="text/css" th:href="${customCss}">
  <link rel="stylesheet" type="text/css" href="../codemirror-eclipse.css" data-th-href="${scriptThemeCssPath}">
  <link rel="stylesheet" type="text/css" href="/sree/portal/font.css" data-th-href="${linkUri + 'portal/font.css'}">
  <link data-th-each="style : ${additionalStyles}" rel="stylesheet" type="text/css" data-th-href="${style}">
  <script data-th-each="script: ${additionalScripts}"  data-th-src="${script}"></script>
  <script data-th-inline="javascript">
      globalPostParams = /*[[${postParams}]]*/ null;
  </script>
</head>
<body oncontextmenu="return false">
  <div class="loading-splash is-loading">
    <img th:if="${not #strings.isEmpty(customLoadingLogo)}"
         class="loading-splash__logo"
         th:src="${customLoadingLogo}" src="" alt=""/>
    <div th:unless="${not #strings.isEmpty(customLoadingLogo)}"
         class="loading-splash__indicator" role="progressbar" aria-label="Loading">
      <svg class="loading-splash__logo-svg" viewBox="0 0 217.797 96.879" xmlns="http://www.w3.org/2000/svg">
        <path class="ls-el ls-wave ls-wave--3" d="M169.03,68.018c-2.276-4.178-25.649,12.536-51.972,12.149C94.109,79.829,83.31,52.83,60.699,52.83C38.762,53.168-2.073,76.117,0.627,80.504c2.7,4.388,18.586-9.928,52.31-10.461c24.317-0.385,30.039,25.816,59.06,26.322C132.244,96.719,172.877,75.072,169.03,68.018z"/>
        <path class="ls-el ls-wave ls-wave--2" d="M73.291,27.349c22.611,0,33.411,26.999,56.36,27.336c26.322,0.388,49.695-16.326,51.972-12.149c3.847,7.055-36.786,28.702-57.034,28.349c-29.021-0.506-34.743-26.708-59.06-26.323c-33.723,0.533-49.61,14.85-52.31,10.462S51.354,27.686,73.291,27.349z"/>
        <path class="ls-el ls-wave ls-wave--1" d="M84.09,3.05c22.611,0,33.411,26.999,56.359,27.336c26.323,0.387,49.695-16.327,51.973-12.149c3.846,7.055-36.786,28.702-57.035,28.348c-29.021-0.506-34.742-26.708-59.059-26.323c-33.723,0.533-49.61,14.849-52.31,10.462C21.318,26.336,62.154,3.388,84.09,3.05z"/>
        <path class="ls-el ls-accent" d="M217.291,9.295c0,4.66-3.777,8.437-8.438,8.437s-8.438-3.777-8.438-8.437s3.777-8.437,8.438-8.437S217.291,4.636,217.291,9.295z"/>
        <path class="ls-el ls-accent ls-accent--wave" d="M167.316,12.164c0,6.416-9.885,11.617-22.078,11.617s-22.079-5.201-22.079-11.617c0-6.416,9.886-11.617,22.079-11.617S167.316,5.749,167.316,12.164z"/>
        <polygon class="ls-el" points="162.618,31.907 126.508,38.319 126.508,80.167 155.929,80.167 162.618,76.305"/>
      </svg>
    </div>
    <span th:if="${#strings.isEmpty(customLoadingLogo)}" data-th-text="#{app.loading}">Loading...</span>
    <span th:if="${not #strings.isEmpty(customLoadingText)}" data-th-text="${customLoadingText}"></span>
  </div>
  <app-root></app-root>
</body>
</html>

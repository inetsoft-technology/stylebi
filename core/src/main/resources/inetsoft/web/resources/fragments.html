<!doctype html>
<html lang="en">
<head><title>Fragments</title></head>
<body>

<div class="d-flex align-items-center bg-navbar-top"
     data-th-fragment="navbar(logoSrc, homeHref)"
     data-th-switch="${customLogo}">
  <a class="auth-brand-link" href="./" data-th-href="${homeHref}" aria-label="StyleBI home">
    <img class="custom-logo" src="portal/logo" data-th-src="${logoSrc}" data-th-case="${true}">
  </a>
  <th-block data-th-case="*">
    <a class="auth-brand-link" href="./" data-th-href="${homeHref}" aria-label="StyleBI home">
      <span class="auth-brand-text">StyleBI</span>
    </a>
  </th-block>
</div>

<div class="login-right" aria-hidden="true" data-th-fragment="login-background">
  <div class="dot-grid"></div>
</div>

<div class="loading-indicator" role="status"
     data-th-attr="aria-label=${spinnerLabel}"
     data-th-fragment="loading-spinner(spinnerLabel)">
  <div class="ln-loading-content">
    <svg class="ln-spinner" viewBox="0 0 56 56" fill="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle class="ln-spinner__track" cx="28" cy="28" r="22"/>
      <circle class="ln-spinner__arc" cx="28" cy="28" r="22"/>
    </svg>
  </div>
</div>

</body>
</html>
